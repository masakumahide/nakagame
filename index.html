<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRD WEEK / バードウィーク</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

:root {
–sky: #87CEEB;
–sky-dark: #4A90D9;
–sun: #FFD700;
–grass: #5DBB63;
–ground: #8B6914;
–pop1: #FF6B6B;
–pop2: #FFE66D;
–pop3: #4ECDC4;
–pop4: #FF8C42;
–pop5: #A8E6CF;
–dark: #1a1a2e;
–white: #FFFDF0;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–dark);
font-family: ‘Press Start 2P’, monospace;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
overflow: hidden;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
position: fixed;
inset: 0;
background: linear-gradient(180deg, #1a0533 0%, #3d1a6e 40%, #FF6B6B 100%);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 100;
gap: 24px;
}

.title-logo {
text-align: center;
animation: titleBounce 1.5s ease-in-out infinite;
}

.title-logo .en {
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(28px, 6vw, 56px);
color: var(–sun);
text-shadow:
4px 4px 0 var(–pop1),
8px 8px 0 #cc4400;
letter-spacing: 4px;
display: block;
}

.title-logo .jp {
font-family: ‘M PLUS Rounded 1c’, sans-serif;
font-size: clamp(14px, 3vw, 22px);
font-weight: 900;
color: var(–white);
text-shadow: 2px 2px 0 var(–pop3);
display: block;
margin-top: 8px;
letter-spacing: 8px;
}

.title-bird {
font-size: clamp(64px, 15vw, 120px);
animation: titleFly 2s ease-in-out infinite;
filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
}

.title-desc {
font-family: ‘M PLUS Rounded 1c’, sans-serif;
font-size: clamp(11px, 2vw, 15px);
color: var(–pop5);
text-align: center;
line-height: 2;
font-weight: 700;
}

.start-btn {
background: var(–sun);
color: var(–dark);
border: none;
padding: 16px 48px;
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(10px, 2vw, 14px);
cursor: pointer;
border-radius: 0;
box-shadow: 6px 6px 0 var(–pop1);
transition: transform 0.1s, box-shadow 0.1s;
animation: blink 1s step-end infinite;
}

.start-btn:hover, .start-btn:active {
transform: translate(3px, 3px);
box-shadow: 3px 3px 0 var(–pop1);
}

@keyframes titleBounce {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-12px); }
}

@keyframes titleFly {
0%, 100% { transform: translateY(0) rotate(-5deg); }
50% { transform: translateY(-20px) rotate(5deg); }
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0; }
}

/* ===== GAME SCREEN ===== */
#game-screen {
display: none;
flex-direction: column;
align-items: center;
width: 100%;
position: relative;
}

/* HUD */
#hud {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
max-width: 640px;
padding: 8px 12px;
background: var(–dark);
border-bottom: 4px solid var(–sun);
}

.hud-block {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
}

.hud-label {
font-size: 7px;
color: var(–pop3);
letter-spacing: 1px;
}

.hud-value {
font-size: clamp(12px, 3vw, 18px);
color: var(–sun);
}

.hud-lives {
font-size: clamp(18px, 4vw, 24px);
letter-spacing: 4px;
}

/* CANVAS */
#gameCanvas {
display: block;
max-width: 640px;
width: 100%;
image-rendering: pixelated;
cursor: none;
}

/* LEVEL BANNER */
#level-banner {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: var(–dark);
border: 4px solid var(–sun);
padding: 24px 48px;
text-align: center;
z-index: 50;
display: none;
box-shadow: 8px 8px 0 var(–pop1);
}

#level-banner .lv-label {
font-size: 10px;
color: var(–pop3);
display: block;
margin-bottom: 8px;
}
#level-banner .lv-num {
font-size: clamp(24px, 5vw, 36px);
color: var(–sun);
}

/* GAME OVER / CLEAR */
#overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 80;
gap: 20px;
text-align: center;
}

#overlay .over-title {
font-size: clamp(24px, 6vw, 48px);
color: var(–pop1);
text-shadow: 4px 4px 0 #880000;
animation: titleBounce 1s infinite;
}
#overlay.clear .over-title {
color: var(–sun);
text-shadow: 4px 4px 0 var(–pop4);
}

#overlay .over-score {
font-size: clamp(12px, 3vw, 18px);
color: var(–white);
}

#overlay .over-score span {
color: var(–sun);
}

#overlay .retry-btn {
background: var(–pop3);
color: var(–dark);
border: none;
padding: 14px 36px;
font-family: ‘Press Start 2P’, monospace;
font-size: clamp(9px, 2vw, 13px);
cursor: pointer;
box-shadow: 5px 5px 0 #007a73;
transition: transform 0.1s, box-shadow 0.1s;
}
#overlay .retry-btn:hover {
transform: translate(2px, 2px);
box-shadow: 3px 3px 0 #007a73;
}

/* Floating score popup */
.score-pop {
position: absolute;
font-family: ‘Press Start 2P’, monospace;
font-size: 14px;
color: var(–sun);
text-shadow: 2px 2px 0 #000;
pointer-events: none;
animation: scoreFloat 1s ease-out forwards;
z-index: 60;
}
@keyframes scoreFloat {
0% { opacity: 1; transform: translateY(0); }
100% { opacity: 0; transform: translateY(-60px); }
}

/* Mobile controls */
#mobile-controls {
display: none;
gap: 16px;
padding: 12px;
}
.ctrl-btn {
width: 64px; height: 64px;
background: rgba(255,255,255,0.15);
border: 3px solid var(–white);
border-radius: 50%;
font-size: 28px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
user-select: none;
-webkit-user-select: none;
active: background rgba(255,255,255,0.3);
}

@media (pointer: coarse) {
#mobile-controls { display: flex; }
}
</style>

</head>
<body>

<!-- TITLE SCREEN -->

<div id="title-screen">
  <div class="title-bird">🐦</div>
  <div class="title-logo">
    <span class="en">BIRD WEEK</span>
    <span class="jp">バードウィーク</span>
  </div>
  <div class="title-desc">
    Feed your chicks! Dodge the enemies!<br>
    ヒナに餌を届けろ！敵をかわせ！
  </div>
  <button class="start-btn" id="startBtn">▶ START / スタート</button>
</div>

<!-- GAME SCREEN -->

<div id="game-screen">
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">SCORE / スコア</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">LIVES / ライフ</span>
      <span class="hud-lives" id="livesDisplay">🐦🐦🐦</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">LEVEL / レベル</span>
      <span class="hud-value" id="levelDisplay">1</span>
    </div>
  </div>
  <canvas id="gameCanvas" width="640" height="400"></canvas>
  <div id="mobile-controls">
    <div class="ctrl-btn" id="btnLeft">◀</div>
    <div class="ctrl-btn" id="btnUp">▲</div>
    <div class="ctrl-btn" id="btnDown">▼</div>
    <div class="ctrl-btn" id="btnRight">▶</div>
  </div>
</div>

<!-- LEVEL BANNER -->

<div id="level-banner">
  <span class="lv-label">LEVEL / レベル</span>
  <span class="lv-num" id="bannerNum">1</span>
</div>

<!-- OVERLAY (Game Over / Clear) -->

<div id="overlay">
  <div class="over-title" id="overTitle">GAME OVER</div>
  <div class="over-score" id="overScore">SCORE: <span>0</span></div>
  <button class="retry-btn" id="retryBtn">▶ RETRY / もう一度</button>
</div>

<script>
// ============================================================
//  BIRD WEEK  — Pure Canvas Game
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Resize canvas to fill container width (keep 8:5 ratio)
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth, 640);
  canvas.style.width  = maxW + 'px';
  canvas.style.height = (maxW * 400 / 640) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── COLOURS ─────────────────────────────────────────────────
const C = {
  skyTop:   '#87CEEB', skyBot: '#C9E8FF',
  sun:      '#FFD700',
  cloud:    '#FFFDF0',
  grass:    '#5DBB63', grassDark: '#3d8f41',
  ground:   '#8B6914',
  nest:     '#8B4513',
  pop1:     '#FF6B6B',
  pop2:     '#FFE66D',
  pop3:     '#4ECDC4',
  pop4:     '#FF8C42',
  pop5:     '#A8E6CF',
  dark:     '#1a1a2e',
  white:    '#FFFDF0',
};

// ── STATE ────────────────────────────────────────────────────
let state, bird, worms, enemies, nests, clouds, particles;
let score, lives, level, feedCount, levelGoal;
let keys = {};
let mouse = { x: 320, y: 200, down: false };
let gameLoop;

const W = 640, H = 400;
const GROUND_Y = H - 60;
const NEST_Y   = GROUND_Y - 18;

// ── INIT ─────────────────────────────────────────────────────
function initGame() {
  score     = 0;
  lives     = 3;
  level     = 1;
  feedCount = 0;
  levelGoal = 5;
  state     = 'playing';

  bird = {
    x: 80, y: 160, w: 36, h: 28,
    vx: 0, vy: 0,
    speed: 3.5,
    hasWorm: false,
    wormColor: '#5DBB63',
    invincible: 0,
    flapFrame: 0,
    flapTimer: 0,
  };

  nests = [
    { x: 520, y: NEST_Y, w: 64, h: 20, chick: true },
  ];

  worms   = [];
  enemies = [];
  particles = [];

  clouds = Array.from({length: 5}, (_, i) => ({
    x: i * 140 + 20, y: 30 + Math.random() * 60,
    w: 80 + Math.random() * 60,
    speed: 0.3 + Math.random() * 0.3,
  }));

  spawnWorm();
  updateHUD();
  showLevelBanner();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('livesDisplay').textContent = '🐦'.repeat(Math.max(0, lives));
  document.getElementById('levelDisplay').textContent = level;
}

// ── SPAWNERS ─────────────────────────────────────────────────
function spawnWorm() {
  if (worms.length >= 2) return;
  const colors = [C.pop3, C.pop5, '#FF9FF3', C.pop2];
  worms.push({
    x: 60 + Math.random() * (W - 180),
    y: GROUND_Y - 8,
    w: 18, h: 14,
    color: colors[Math.floor(Math.random() * colors.length)],
    wiggle: 0,
    wiggleDir: 1,
  });
}

function spawnEnemy() {
  const types = ['hawk', 'crow', 'bat'];
  const type  = types[Math.floor(Math.random() * types.length)];
  const fromRight = Math.random() < 0.5;
  enemies.push({
    x: fromRight ? W + 30 : -30,
    y: 40 + Math.random() * (GROUND_Y - 100),
    w: 32, h: 24,
    vx: (fromRight ? -1 : 1) * (1.5 + level * 0.4),
    vy: 0,
    type,
    sinOffset: Math.random() * Math.PI * 2,
    t: 0,
  });
}

// ── PARTICLE ─────────────────────────────────────────────────
function burst(x, y, color, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i;
    particles.push({
      x, y,
      vx: Math.cos(a) * (2 + Math.random() * 3),
      vy: Math.sin(a) * (2 + Math.random() * 3),
      life: 1, color,
      r: 4 + Math.random() * 4,
    });
  }
}

function scorePopup(x, y, text) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = text;
  // position relative to canvas
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width  / W;
  const scaleY = rect.height / H;
  el.style.left = (rect.left + x * scaleX) + 'px';
  el.style.top  = (rect.top  + y * scaleY) + 'px';
  el.style.position = 'fixed';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ── LEVEL BANNER ─────────────────────────────────────────────
function showLevelBanner() {
  const banner = document.getElementById('level-banner');
  document.getElementById('bannerNum').textContent = level;
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 1800);
}

// ── NEXT LEVEL ───────────────────────────────────────────────
function nextLevel() {
  level++;
  feedCount = 0;
  levelGoal = 5 + level;
  updateHUD();
  bird.hasWorm = false;
  enemies = [];
  worms   = [];
  spawnWorm();
  showLevelBanner();

  if (level > 5) {
    endGame(true);
  }
}

// ── DEATH ────────────────────────────────────────────────────
function takeDamage() {
  if (bird.invincible > 0) return;
  lives--;
  bird.invincible = 120;
  bird.hasWorm = false;
  burst(bird.x, bird.y, C.pop1, 12);
  updateHUD();
  if (lives <= 0) endGame(false);
}

// ── GAME OVER / CLEAR ────────────────────────────────────────
function endGame(win) {
  state = win ? 'clear' : 'over';
  cancelAnimationFrame(gameLoop);
  const overlay = document.getElementById('overlay');
  overlay.className = win ? 'clear' : '';
  document.getElementById('overTitle').textContent  = win ? '🎉 YOU WIN! / クリア！' : 'GAME OVER / ゲームオーバー';
  document.getElementById('overScore').innerHTML    = `SCORE / スコア: <span>${score}</span>`;
  overlay.style.display = 'flex';
}

// ── INPUT ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
});

// Mobile
['btnLeft','btnRight','btnUp','btnDown'].forEach(id => {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerdown', () => { keys['mob_' + id] = true; });
  btn.addEventListener('pointerup',   () => { keys['mob_' + id] = false; });
  btn.addEventListener('pointerleave',() => { keys['mob_' + id] = false; });
});

// ── UPDATE ────────────────────────────────────────────────────
let enemyTimer = 0;
let wormTimer  = 0;

function update() {
  if (state !== 'playing') return;

  // Bird movement — keyboard
  if (keys['ArrowLeft']  || keys['KeyA'] || keys['mob_btnLeft'])  bird.vx -= 0.8;
  if (keys['ArrowRight'] || keys['KeyD'] || keys['mob_btnRight']) bird.vx += 0.8;
  if (keys['ArrowUp']    || keys['KeyW'] || keys['mob_btnUp'])    bird.vy -= 0.8;
  if (keys['ArrowDown']  || keys['KeyS'] || keys['mob_btnDown'])  bird.vy += 0.8;

  // Mouse follow (gentle)
  const dx = mouse.x - bird.x;
  const dy = mouse.y - bird.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 30) {
    bird.vx += dx / dist * 1.2;
    bird.vy += dy / dist * 1.2;
  }

  // Friction & max speed
  bird.vx *= 0.82;
  bird.vy *= 0.82;
  const spd = bird.speed + level * 0.2;
  const mag = Math.sqrt(bird.vx**2 + bird.vy**2);
  if (mag > spd) { bird.vx = bird.vx/mag*spd; bird.vy = bird.vy/mag*spd; }

  bird.x += bird.vx;
  bird.y += bird.vy;

  // Boundaries
  bird.x = Math.max(bird.w/2, Math.min(W - bird.w/2, bird.x));
  bird.y = Math.max(bird.h/2, Math.min(GROUND_Y - bird.h, bird.y));

  // Flap animation
  bird.flapTimer++;
  if (bird.flapTimer > 6) { bird.flapTimer = 0; bird.flapFrame = (bird.flapFrame + 1) % 3; }

  // Invincibility cooldown
  if (bird.invincible > 0) bird.invincible--;

  // ── Worms ──
  worms.forEach(w => {
    w.wiggle += 0.1 * w.wiggleDir;
    if (Math.abs(w.wiggle) > 4) w.wiggleDir *= -1;
  });

  // Bird picks up worm
  if (!bird.hasWorm) {
    worms = worms.filter(w => {
      const hit = Math.abs(bird.x - (w.x + w.w/2)) < 28 &&
                  Math.abs(bird.y - (w.y + w.h/2)) < 28;
      if (hit) {
        bird.hasWorm  = true;
        bird.wormColor = w.color;
        burst(w.x, w.y, w.color, 6);
        score += 10;
        scorePopup(w.x, w.y, '+10');
        updateHUD();
        return false;
      }
      return true;
    });
  }

  // Bird delivers to nest
  if (bird.hasWorm) {
    nests.forEach(n => {
      const hit = Math.abs(bird.x - (n.x + n.w/2)) < 48 &&
                  Math.abs(bird.y - (n.y + n.h/2)) < 48;
      if (hit) {
        bird.hasWorm = false;
        feedCount++;
        score += 50;
        burst(n.x + n.w/2, n.y, C.sun, 10);
        scorePopup(n.x + n.w/2, n.y - 20, '+50 FEED!');
        updateHUD();
        if (feedCount >= levelGoal) nextLevel();
      }
    });
  }

  // Spawn timers
  wormTimer++;
  if (wormTimer > Math.max(120, 240 - level * 20)) {
    wormTimer = 0;
    spawnWorm();
  }

  enemyTimer++;
  if (enemyTimer > Math.max(80, 200 - level * 18)) {
    enemyTimer = 0;
    spawnEnemy();
  }

  // ── Enemies ──
  enemies.forEach(e => {
    e.t++;
    e.x += e.vx;
    e.y += Math.sin(e.t * 0.05 + e.sinOffset) * 1.2;

    // Bird collision
    const hit = Math.abs(bird.x - (e.x + e.w/2)) < 24 &&
                Math.abs(bird.y - (e.y + e.h/2)) < 24;
    if (hit) takeDamage();
  });

  // Remove off-screen enemies
  enemies = enemies.filter(e => e.x > -60 && e.x < W + 60);

  // ── Clouds ──
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x + c.w < 0) c.x = W + 10;
  });

  // ── Particles ──
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.03;
    p.r *= 0.95;
  });
  particles = particles.filter(p => p.life > 0);
}

// ── DRAW ──────────────────────────────────────────────────────
function draw() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, C.skyTop);
  skyGrad.addColorStop(1, C.skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Sun
  ctx.fillStyle = C.sun;
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(60, 60, 36, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Clouds
  clouds.forEach(c => drawCloud(c.x, c.y, c.w));

  // Ground
  ctx.fillStyle = C.grassDark;
  ctx.fillRect(0, GROUND_Y, W, 8);
  ctx.fillStyle = C.grass;
  ctx.fillRect(0, GROUND_Y, W, 4);

  // Dirt
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, GROUND_Y + 4, W, H - GROUND_Y);

  // Grass tufts
  for (let gx = 10; gx < W; gx += 22) {
    drawGrassTuft(gx, GROUND_Y);
  }

  // Nests
  nests.forEach(n => drawNest(n));

  // Worms
  worms.forEach(w => drawWorm(w));

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Bird
  drawBird(bird);

  // Progress bar
  drawProgressBar();
}

function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,253,240,0.88)';
  ctx.beginPath();
  ctx.arc(x + w*0.25, y + 12, 18, 0, Math.PI*2);
  ctx.arc(x + w*0.5,  y + 6,  24, 0, Math.PI*2);
  ctx.arc(x + w*0.75, y + 12, 18, 0, Math.PI*2);
  ctx.fill();
}

function drawGrassTuft(x, y) {
  ctx.fillStyle = '#3d8f41';
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x-5, y-10); ctx.lineTo(x+2, y-6);
  ctx.lineTo(x+1, y-14); ctx.lineTo(x+6, y-8); ctx.lineTo(x+10, y);
  ctx.fill();
}

function drawNest(n) {
  // Nest body
  ctx.fillStyle = C.nest;
  ctx.beginPath();
  ctx.ellipse(n.x + n.w/2, n.y + n.h/2, n.w/2, n.h/2, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#5D3A1A';
  ctx.beginPath();
  ctx.ellipse(n.x + n.w/2, n.y + n.h/2, n.w/2 - 4, n.h/2 - 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Chick
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🐣', n.x + n.w/2, n.y - 2);
}

function drawWorm(w) {
  ctx.save();
  ctx.translate(w.x + w.wiggle, w.y);
  ctx.fillStyle = w.color;
  // Body segments
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(i * 6, 0, 5, 0, Math.PI*2);
    ctx.fill();
  }
  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(14, -2, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x + e.w/2, e.y + e.h/2);
  if (e.vx > 0) ctx.scale(-1, 1);

  const emojis = { hawk: '🦅', crow: '🐦‍⬛', bat: '🦇' };
  const sizes  = { hawk: 28, crow: 24, bat: 22 };

  ctx.font = sizes[e.type] + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emojis[e.type] || '🦅', 0, 0);
  ctx.restore();
}

function drawBird(b) {
  if (b.invincible > 0 && Math.floor(b.invincible / 6) % 2 === 0) return;

  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.vx < 0) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, GROUND_Y - b.y + 4, 16, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = C.pop4;
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing (flapping)
  const wingAngles = [-0.3, 0, 0.4];
  ctx.fillStyle = '#FF6B20';
  ctx.save();
  ctx.rotate(wingAngles[b.flapFrame]);
  ctx.beginPath();
  ctx.ellipse(-4, -8, 14, 6, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Head
  ctx.fillStyle = C.pop4;
  ctx.beginPath();
  ctx.arc(12, -6, 9, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(15, -8, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(16, -8, 2, 0, Math.PI*2); ctx.fill();

  // Beak
  ctx.fillStyle = C.sun;
  ctx.beginPath();
  ctx.moveTo(20, -6); ctx.lineTo(27, -4); ctx.lineTo(20, -2);
  ctx.fill();

  // Worm carried
  if (b.hasWorm) {
    ctx.fillStyle = b.wormColor;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(22 + i * 5, -1, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawProgressBar() {
  const bw = 200, bh = 12;
  const bx = W/2 - bw/2, by = H - 28;
  const pct = Math.min(feedCount / levelGoal, 1);

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx, by, bw, bh);

  const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
  grad.addColorStop(0, C.pop3);
  grad.addColorStop(1, C.sun);
  ctx.fillStyle = grad;
  ctx.fillRect(bx, by, bw * pct, bh);

  ctx.strokeStyle = C.white;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);

  ctx.fillStyle = C.white;
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(`${feedCount}/${levelGoal} FEEDS / えさやり`, W/2, by - 4);
}

// ── LOOP ──────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  gameLoop = requestAnimationFrame(loop);
}

// ── START / RETRY ─────────────────────────────────────────────
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  document.getElementById('overlay').style.display      = 'none';
  initGame();
  loop();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  cancelAnimationFrame(gameLoop);
  initGame();
  loop();
});
</script>

</body>
