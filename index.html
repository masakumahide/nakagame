<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>質問アプリ</title>
  <meta name="description" content="1問ずつ答えて結果を生成する質問型アプリ">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1 class="title">質問アプリ</h1>
      <p class="description">
        いくつかの質問に答えると、最後に結果を表示します。
        入力内容はこの端末に一時保存されるため、途中で閉じても再開できます。
      </p>
    </header>

    <section class="card" aria-labelledby="question-section-title">
      <div class="topbar">
        <h2 id="question-section-title" class="section-title">質問に答える</h2>
        <p id="progressText" class="progress" aria-live="polite">1 / 5</p>
      </div>

      <div class="progressbar" aria-hidden="true">
        <div id="progressBarFill" class="progressbar-fill"></div>
      </div>

      <form id="questionForm" novalidate>
        <div class="field">
          <label id="questionLabel" class="question-label" for="answerInput">
            質問文がここに表示されます
          </label>

          <input
            id="answerInput"
            class="input"
            type="text"
            name="answer"
            maxlength="300"
            autocomplete="off"
            placeholder="ここに入力"
          >

          <textarea
            id="answerTextarea"
            class="textarea hidden"
            name="answerLong"
            rows="6"
            maxlength="1000"
            placeholder="ここに入力してください"
          ></textarea>

          <div class="meta-row">
            <p id="inputHint" class="hint">300文字まで</p>
            <p id="charCount" class="char-count" aria-live="polite">0</p>
          </div>

          <p id="formError" class="error hidden" role="alert"></p>
        </div>

        <div class="actions">
          <button id="backButton" type="button" class="button button-secondary">戻る</button>
          <button id="nextButton" type="submit" class="button button-primary">次へ</button>
        </div>
      </form>
    </section>

    <section id="reviewSection" class="card hidden" aria-labelledby="review-title">
      <div class="topbar">
        <h2 id="review-title" class="section-title">入力内容の確認</h2>
        <p class="progress">完了</p>
      </div>

      <div id="answerSummary" class="summary-list"></div>

      <div class="actions">
        <button id="editButton" type="button" class="button button-secondary">回答を修正する</button>
        <button id="generateButton" type="button" class="button button-primary">結果を見る</button>
      </div>
    </section>

    <section id="loadingSection" class="card hidden" aria-labelledby="loading-title">
      <h2 id="loading-title" class="section-title">生成中</h2>
      <div class="loading-wrap">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">結果を作成しています。少しお待ちください。</p>
      </div>
    </section>

    <section id="resultSection" class="card hidden" aria-labelledby="result-title">
      <div class="topbar">
        <h2 id="result-title" class="section-title">結果</h2>
        <p id="resultMode" class="mode-badge" aria-live="polite"></p>
      </div>

      <pre id="resultText" class="result-text"></pre>

      <div class="actions">
        <button id="retryButton" type="button" class="button button-secondary">もう一度結果を作る</button>
        <button id="resetButton" type="button" class="button button-danger">最初からやり直す</button>
      </div>
    </section>

    <section id="apiErrorSection" class="card hidden" aria-labelledby="api-error-title">
      <h2 id="api-error-title" class="section-title">エラー</h2>
      <p id="apiErrorText" class="error-text">結果の生成に失敗しました。</p>
      <div class="actions">
        <button id="closeErrorButton" type="button" class="button button-secondary">戻る</button>
      </div>
    </section>
  </main>

  <noscript>
    <div class="noscript">
      このアプリを使うには JavaScript を有効にしてください。
    </div>
  </noscript>

  <script>
    window.APP_CONFIG = {
      PROXY_URL: "https://ここにあなたのworker-url.workers.dev"
    };
  </script>
  <script src="./app.js" defer></script>
</body>
</html>
