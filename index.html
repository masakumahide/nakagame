<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ヒデコメンター</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --accent2: #f5a623;
  --text: #eaeaea;
  --muted: #8892a4;
  --hide-bg: #fff8e7;
  --cat-bg: #fff0f5;
  --user-bg: #1e3a5f;
  --radius: 20px;
  --shadow: 0 8px 32px rgba(0,0,0,.45);
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
background: var(–bg);
font-family: ‘Zen Maru Gothic’, ‘Hiragino Maru Gothic ProN’, sans-serif;
color: var(–text);
overflow: hidden;
}

#app {
display: flex;
flex-direction: column;
height: 100dvh;
max-width: 600px;
margin: 0 auto;
position: relative;
}

/* ── Header ── */
#header {
padding: 14px 20px 10px;
background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
border-bottom: 1px solid rgba(233,69,96,.3);
flex-shrink: 0;
position: relative;
overflow: hidden;
}

#header::before {
content: ‘’;
position: absolute;
inset: 0;
background: repeating-linear-gradient(
45deg,
transparent,
transparent 12px,
rgba(233,69,96,.04) 12px,
rgba(233,69,96,.04) 24px
);
}

.header-inner {
position: relative;
display: flex;
align-items: center;
gap: 12px;
}

.hide-avatar {
width: 52px;
height: 52px;
border-radius: 50%;
background: linear-gradient(135deg, var(–accent2), #ffcc02);
display: flex;
align-items: center;
justify-content: center;
font-size: 28px;
flex-shrink: 0;
box-shadow: 0 0 0 3px rgba(245,166,35,.3), var(–shadow);
animation: pulse-avatar 3s ease-in-out infinite;
}

@keyframes pulse-avatar {
0%, 100% { box-shadow: 0 0 0 3px rgba(245,166,35,.3), var(–shadow); }
50% { box-shadow: 0 0 0 6px rgba(245,166,35,.15), var(–shadow); }
}

.header-text h1 {
font-size: 18px;
font-weight: 900;
color: #fff;
letter-spacing: .04em;
line-height: 1.2;
}

.header-text p {
font-size: 11px;
color: var(–accent2);
margin-top: 2px;
font-weight: 700;
letter-spacing: .06em;
}

.status-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: #4ade80;
box-shadow: 0 0 8px #4ade80;
animation: blink 2s ease-in-out infinite;
margin-left: auto;
flex-shrink: 0;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: .4; }
}

/* ── Messages ── */
#messages {
flex: 1;
overflow-y: auto;
padding: 16px 16px 8px;
display: flex;
flex-direction: column;
gap: 14px;
scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(233,69,96,.3); border-radius: 4px; }

.msg-row {
display: flex;
gap: 10px;
align-items: flex-end;
animation: msg-in .3s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes msg-in {
from { opacity: 0; transform: translateY(16px) scale(.95); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row.user { flex-direction: row-reverse; }

.avatar {
width: 36px;
height: 36px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
flex-shrink: 0;
}

.avatar.hide {
background: linear-gradient(135deg, var(–accent2), #ffcc02);
box-shadow: 0 4px 12px rgba(245,166,35,.35);
}

.avatar.cat {
background: linear-gradient(135deg, #ffb3c6, #ff6b9d);
box-shadow: 0 4px 12px rgba(255,107,157,.35);
}

.avatar.user {
background: linear-gradient(135deg, #667eea, #764ba2);
box-shadow: 0 4px 12px rgba(102,126,234,.35);
}

.bubble-wrap {
max-width: calc(100% - 56px);
display: flex;
flex-direction: column;
gap: 4px;
}

.msg-row.user .bubble-wrap { align-items: flex-end; }

.sender-name {
font-size: 10px;
font-weight: 700;
color: var(–muted);
padding: 0 6px;
letter-spacing: .05em;
}

.bubble {
padding: 12px 16px;
border-radius: 18px;
font-size: 14px;
line-height: 1.65;
font-weight: 500;
position: relative;
word-break: break-word;
}

.bubble.hide {
background: var(–hide-bg);
color: #2d2d2d;
