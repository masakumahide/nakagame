<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HIDE WEEK</title>
<style>
  :root{
    --bg:#08111f;
    --panel:#10203a;
    --line:#f3dd91;
    --text:#fff7d6;
    --gold:#ffd24d;
    --cyan:#96e8ff;
    --red:#ff8585;
    --green:#8df0aa;
    --violet:#8a7cff;
  }
  *{box-sizing:border-box;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden}
  #app{width:min(100vw,860px);display:flex;flex-direction:column;align-items:center}
  #title,#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;z-index:20}
  #title{background:linear-gradient(180deg,#182f62 0%,#3368a4 45%,#8acaf0 100%)}
  .logo{font-size:clamp(30px,7vw,64px);font-weight:900;letter-spacing:3px;color:var(--gold);text-shadow:4px 4px 0 rgba(0,0,0,.28);margin:12px 0}
  .sub{font-size:clamp(12px,2.7vw,16px);line-height:1.9;color:#fff8cf;margin-bottom:18px;max-width:36em}
  .btn{border:0;background:var(--gold);color:#111;font-family:inherit;font-size:18px;font-weight:800;padding:14px 26px;box-shadow:0 6px 0 #9e7300;cursor:pointer;border-radius:10px}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #9e7300}
  #titleArt{image-rendering:pixelated;margin-bottom:12px;border-radius:12px}
  .hint{font-size:12px;line-height:1.8;color:#eef7ff;margin-top:16px}
  #ui{display:none;width:100%;flex-direction:column;align-items:center}
  #hud{width:100%;display:flex;gap:8px;justify-content:space-between;background:var(--panel);border:4px solid var(--line);border-bottom:none;padding:10px 8px;font-weight:700}
  .box{flex:1;min-width:0;text-align:center}
  .label{display:block;font-size:10px;color:var(--cyan);margin-bottom:4px}
  .value{display:block;font-size:16px;color:var(--gold)}
  #game{display:block;width:100%;aspect-ratio:8/5;max-width:860px;border:4px solid var(--line);background:#7dd1ff;image-rendering:pixelated;touch-action:none}
  #pad{display:none;width:100%;max-width:860px;justify-content:space-between;padding:10px 4px 0;gap:10px}
  .cluster{display:flex;gap:10px}
  .padbtn{width:64px;height:64px;border-radius:12px;border:3px solid var(--line);background:#1b2b4d;color:var(--text);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;user-select:none}
  #overlay{display:none;background:rgba(0,0,0,.78)}
  #overlayTitle{font-size:clamp(28px,7vw,50px);font-weight:900;color:var(--red);margin-bottom:12px}
  #overlayScore{font-size:18px;margin-bottom:20px;line-height:1.7;white-space:pre-line}
  @media (pointer:coarse){#pad{display:flex}}
</style>
</head>
<body>
<div id="app">
  <div id="title">
    <canvas id="titleArt" width="220" height="130"></canvas>
    <div class="logo">HIDE WEEK</div>
    <div class="sub">collect snacks, fly them to the rooftop twins, and dodge the trouble makers<br>おやつを拾って屋上のふたりに届けよう</div>
    <button id="start" class="btn" type="button">START</button>
    <div class="hint">KEYBOARD: ← ↑ → ↓ / WASD<br>MOBILE: DRAG OR BUTTONS</div>
  </div>

  <div id="ui">
    <div id="hud">
      <div class="box"><span class="label">SCORE</span><span class="value" id="score">0</span></div>
      <div class="box"><span class="label">LIVES</span><span class="value" id="lives">♥♥♥♥</span></div>
      <div class="box"><span class="label">STAGE</span><span class="value" id="stage">1</span></div>
      <div class="box"><span class="label">DELIVERY</span><span class="value" id="feed">0/3</span></div>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="pad">
      <div class="cluster">
        <div class="padbtn" id="left">◀</div>
        <div class="padbtn" id="right">▶</div>
      </div>
      <div class="cluster">
        <div class="padbtn" id="up">▲</div>
        <div class="padbtn" id="down">▼</div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div id="overlayTitle">GAME OVER</div>
    <div id="overlayScore">SCORE 0</div>
    <button id="retry" class="btn" type="button">RETRY</button>
  </div>
</div>

<script>
(function(){
  var title = document.getElementById('title');
  var ui = document.getElementById('ui');
  var overlay = document.getElementById('overlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlayScore = document.getElementById('overlayScore');
  var startBtn = document.getElementById('start');
  var retryBtn = document.getElementById('retry');
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var titleArt = document.getElementById('titleArt');
  var tctx = titleArt.getContext('2d');

  var scoreEl = document.getElementById('score');
  var livesEl = document.getElementById('lives');
  var stageEl = document.getElementById('stage');
  var feedEl = document.getElementById('feed');

  var W = canvas.width;
  var H = canvas.height;

  var state = 'title';
  var last = 0;
  var raf = 0;
  var keys = {};
  var pointer = { active:false, x:0, y:0 };

  var game = {
    score:0,
    lives:4,
    stage:1,
    feed:0,
    goal:3,
    player:null,
    home:{ x:650, y:120, w:120, h:62 },
    platform:{ x:570, y:160, w:160, h:10 },
    snacks:[],
    enemies:[],
    popups:[],
    particles:[],
    clouds:[],
    stars:[],
    invuln:0,
    enemyTimer:0,
    enemyDelay:2.4,
    snackTimer:0,
    banner:0,
    flash:0
  };

  function makePlayer(){
    game.player = {
      x:130,
      y:250,
      vx:0,
      vy:0,
      w:36,
      h:28,
      carrying:false,
      face:1,
      flap:0
    };
  }

  function updateHud(){
    scoreEl.textContent = String(game.score);
    livesEl.textContent = '♥'.repeat(Math.max(0, game.lives));
    stageEl.textContent = String(game.stage);
    feedEl.textContent = game.feed + '/' + game.goal;
  }

  function rect(x,y,w,h){ return {x:x,y:y,w:w,h:h}; }
  function overlap(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function playerBox(){
    return rect(game.player.x - game.player.w/2, game.player.y - game.player.h/2, game.player.w, game.player.h);
  }

  function addPopup(x,y,text,color){
    game.popups.push({ x:x, y:y, text:text, color:color || '#ffd24d', life:54 });
  }

  function burst(x,y,color,count){
    var i, a, sp;
    count = count || 12;
    for(i=0;i<count;i++){
      a = Math.random() * Math.PI * 2;
      sp = 1 + Math.random() * 3;
      game.particles.push({
        x:x, y:y,
        vx:Math.cos(a) * sp,
        vy:Math.sin(a) * sp,
        life:30 + Math.random() * 22,
        r:2 + Math.random() * 2,
        color:color || '#fff'
      });
    }
  }

  function spawnClouds(){
    var i;
    game.clouds = [];
    for(i=0;i<6;i++){
      game.clouds.push({
        x:i * 150 + Math.random() * 80,
        y:30 + Math.random() * 120,
        s:22 + Math.random() * 20,
        vx:10 + Math.random() * 10
      });
    }
    game.stars = [];
    for(i=0;i<50;i++){
      game.stars.push({ x:Math.random()*W, y:Math.random()*220, r:1+Math.random()*2 });
    }
  }

  function spawnSnack(x, y){
    var kinds = ['cookie','berry','fish'];
    var sx = (typeof x === 'number') ? x : 120 + Math.random() * 420;
    var sy = (typeof y === 'number') ? y : 160 + Math.random() * 180;
    game.snacks.push({
      kind:kinds[(Math.random() * kinds.length) | 0],
      x:sx,
      y:sy,
      baseY:sy,
      phase:Math.random() * 6.28,
      vx:(Math.random() < 0.5 ? -1 : 1) * (18 + Math.random() * 16),
      w:18,
      h:16
    });
  }

  function spawnEnemy(){
    var dir = Math.random() < 0.5 ? 1 : -1;
    var typeRoll = Math.random();

    if(typeRoll < 0.36){
      game.enemies.push({
        type:'balloon',
        x:dir > 0 ? -40 : W + 40,
        y:90 + Math.random() * 180,
        baseY:90 + Math.random() * 180,
        vx:dir * (52 + game.stage * 6),
        t:Math.random() * 6.28,
        w:28,
        h:30
      });
    }else if(typeRoll < 0.72){
      game.enemies.push({
        type:'bat',
        x:dir > 0 ? -34 : W + 34,
        y:80 + Math.random() * 160,
        baseY:80 + Math.random() * 160,
        vx:dir * (66 + game.stage * 7),
        t:0,
        w:30,
        h:18
      });
    }else{
      game.enemies.push({
        type:'kitecat',
        x:dir > 0 ? -36 : W + 36,
        y:150 + Math.random() * 170,
        vx:dir * (50 + game.stage * 5),
        t:0,
        w:30,
        h:26
      });
    }
  }

  function initStage(n){
    var homes = [
      {x:650, y:138},
      {x:620, y:94},
      {x:682, y:170},
      {x:592, y:118},
      {x:660, y:82}
    ];
    var pos = homes[(n - 1) % homes.length];
    var i;

    game.stage = n;
    game.feed = 0;
    game.goal = Math.min(6, 2 + n);
    game.home.x = pos.x;
    game.home.y = pos.y;
    game.platform.x = pos.x - 84;
    game.platform.y = pos.y + 36;

    game.snacks = [];
    game.enemies = [];
    game.popups = [];
    game.particles = [];
    game.enemyTimer = 0;
    game.enemyDelay = Math.max(1.3, 2.6 - n * 0.18);
    game.snackTimer = 0;
    game.invuln = 110;
    game.banner = 120;
    game.flash = 20;

    makePlayer();
    spawnClouds();

    for(i=0;i<4;i++) spawnSnack();
    updateHud();
  }

  function startGame(){
    game.score = 0;
    game.lives = 4;
    initStage(1);
    state = 'playing';
    title.style.display = 'none';
    ui.style.display = 'flex';
    overlay.style.display = 'none';
    last = 0;
    if(raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function nextStage(){
    if(game.stage >= 5){
      state = 'clear';
      overlayTitle.textContent = 'ALL CLEAR';
      overlayTitle.style.color = '#ffd24d';
      overlayScore.textContent = 'FINAL SCORE ' + game.score + '\nThanks for delivering!';
      overlay.style.display = 'flex';
      return;
    }
    initStage(game.stage + 1);
  }

  function gameOver(){
    state = 'over';
    overlayTitle.textContent = 'GAME OVER';
    overlayTitle.style.color = '#ff8585';
    overlayScore.textContent = 'SCORE ' + game.score;
    overlay.style.display = 'flex';
  }

  function hurtPlayer(){
    var px, py;
    if(game.invuln > 0) return;

    px = game.player.x;
    py = game.player.y;

    game.lives -= 1;
    game.invuln = 130;

    if(game.player.carrying){
      game.player.carrying = false;
      spawnSnack(
        Math.max(90, Math.min(W - 200, px - 30 + Math.random()*60)),
        Math.max(120, Math.min(H - 120, py + 20))
      );
    }

    burst(px, py, '#ff9d9d', 16);
    addPopup(px, py - 18, '-1 LIFE', '#ffbcbc');
    updateHud();

    if(game.lives <= 0) gameOver();
  }

  function update(dt){
    var p, accel, maxSpeed, i, obj, box, dx, dy, d, snackBox;
    if(state !== 'playing') return;

    p = game.player;
    accel = 460;
    maxSpeed = 190;

    if(keys.ArrowLeft || keys.KeyA) p.vx -= accel * dt;
    if(keys.ArrowRight || keys.KeyD) p.vx += accel * dt;
    if(keys.ArrowUp || keys.KeyW) p.vy -= accel * dt;
    if(keys.ArrowDown || keys.KeyS) p.vy += accel * dt;

    if(pointer.active){
      p.vx += (pointer.x - p.x) * 2.9 * dt;
      p.vy += (pointer.y - p.y) * 2.9 * dt;
    }

    p.vx *= Math.pow(0.84, dt * 60);
    p.vy *= Math.pow(0.84, dt * 60);

    if(p.vx > maxSpeed) p.vx = maxSpeed;
    if(p.vx < -maxSpeed) p.vx = -maxSpeed;
    if(p.vy > maxSpeed) p.vy = maxSpeed;
    if(p.vy < -maxSpeed) p.vy = -maxSpeed;

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.flap += dt * (10 + (Math.abs(p.vx) + Math.abs(p.vy)) * 0.03);
    if(p.vx > 2) p.face = 1;
    if(p.vx < -2) p.face = -1;

    if(p.x < 24) p.x = 24;
    if(p.x > W - 24) p.x = W - 24;
    if(p.y < 48) p.y = 48;
    if(p.y > H - 60) p.y = H - 60;

    game.invuln -= dt * 60;
    if(game.invuln < 0) game.invuln = 0;
    game.banner -= dt * 60;
    if(game.banner < 0) game.banner = 0;
    game.flash -= dt * 60;
    if(game.flash < 0) game.flash = 0;

    for(i=0;i<game.clouds.length;i++){
      obj = game.clouds[i];
      obj.x -= obj.vx * dt;
      if(obj.x < -120) obj.x = W + 120;
    }

    game.snackTimer += dt;
    if(game.snackTimer > 2.2){
      game.snackTimer = 0;
      if(game.snacks.length < 5) spawnSnack();
    }

    game.enemyTimer += dt;
    if(game.enemyTimer > game.enemyDelay){
      game.enemyTimer = 0;
      if(game.enemies.length < 5) spawnEnemy();
    }

    box = playerBox();

    for(i=game.snacks.length - 1;i>=0;i--){
      obj = game.snacks[i];
      obj.phase += dt * 3.6;
      obj.x += obj.vx * dt;
      obj.y = obj.baseY + Math.sin(obj.phase * 2) * 9 + Math.cos(obj.phase * 1.5) * 4;
      if(obj.x < 80 || obj.x > W - 120) obj.vx *= -1;

      snackBox = rect(obj.x - obj.w/2, obj.y - obj.h/2, obj.w, obj.h);
      if(!p.carrying && overlap(box, snackBox)){
        p.carrying = true;
        game.snacks.splice(i,1);
        game.score += 20;
        burst(obj.x, obj.y, '#fff2a8', 8);
        addPopup(obj.x, obj.y - 14, '+20', '#fff2a8');
        updateHud();
      }
    }

    if(p.carrying && overlap(box, rect(game.home.x - game.home.w/2, game.home.y - game.home.h/2, game.home.w, game.home.h))){
      p.carrying = false;
      game.feed += 1;
      game.score += 100;
      burst(game.home.x, game.home.y, '#8df0aa', 14);
      addPopup(game.home.x, game.home.y - 20, 'DELIVERY +100', '#8df0aa');
      updateHud();
      if(game.feed >= game.goal){
        nextStage();
        return;
      }
    }

    for(i=game.enemies.length - 1;i>=0;i--){
      obj = game.enemies[i];
      obj.t += dt;

      if(obj.type === 'balloon'){
        obj.x += obj.vx * dt;
        obj.y = obj.baseY + Math.sin(obj.t * 3.2) * 18;
      }else if(obj.type === 'bat'){
        obj.x += obj.vx * dt;
        obj.y = obj.baseY + Math.sin(obj.t * 7) * 24;
      }else{
        obj.x += obj.vx * dt;
        dx = p.x - obj.x;
        dy = p.y - obj.y;
        d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
        if(d < 170){
          obj.x += dx / d * 24 * dt;
          obj.y += dy / d * 24 * dt;
        }else{
          obj.y += Math.sin(obj.t * 5) * 0.8;
        }
      }

      if(overlap(box, rect(obj.x - obj.w/2, obj.y - obj.h/2, obj.w, obj.h))){
        hurtPlayer();
      }

      if(obj.x < -90 || obj.x > W + 90 || obj.y < -70 || obj.y > H + 70){
        game.enemies.splice(i,1);
      }
    }

    for(i=game.popups.length - 1;i>=0;i--){
      obj = game.popups[i];
      obj.y -= 0.5;
      obj.life -= 1;
      if(obj.life <= 0) game.popups.splice(i,1);
    }

    for(i=game.particles.length - 1;i>=0;i--){
      obj = game.particles[i];
      obj.x += obj.vx;
      obj.y += obj.vy;
      obj.vy += 0.035;
      obj.life -= 1;
      if(obj.life <= 0) game.particles.splice(i,1);
    }
  }

  function drawCloud(x,y,s,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x - s*0.45, y, s*0.42, 0, Math.PI*2);
    ctx.arc(x, y - s*0.14, s*0.58, 0, Math.PI*2);
    ctx.arc(x + s*0.52, y, s*0.42, 0, Math.PI*2);
    ctx.fill();
  }

  function drawTree(x,base,h){
    ctx.fillStyle = '#6f4b2e';
    ctx.fillRect(x - 9, base - h, 18, h);
    ctx.fillStyle = '#49a447';
    ctx.beginPath();
    ctx.arc(x, base - h - 18, 32, 0, Math.PI*2);
    ctx.arc(x - 22, base - h + 8, 26, 0, Math.PI*2);
    ctx.arc(x + 22, base - h + 10, 25, 0, Math.PI*2);
    ctx.fill();
  }

  function drawHome(){
    var blink = Math.sin(Date.now() * 0.01) > 0;
    ctx.fillStyle = '#6b4b2d';
    ctx.fillRect(game.platform.x, game.platform.y, game.platform.w, game.platform.h);

    ctx.fillStyle = '#80552f';
    roundRectFill(ctx, game.home.x - 34, game.home.y - 8, 68, 30, 14);

    drawTwin(game.home.x - 16, game.home.y - 6, blink);
    drawTwin(game.home.x + 16, game.home.y - 4, !blink);
  }

  function drawTwin(x,y,open){
    ctx.fillStyle = '#f7f0a8';
    ctx.fillRect(x - 8, y - 9, 16, 16);
    ctx.fillStyle = '#1b1b1b';
    ctx.fillRect(x - 4, y - 4, 2, 2);
    ctx.fillRect(x + 2, y - 4, 2, 2);
    ctx.fillStyle = '#ff9b39';
    if(open) ctx.fillRect(x - 5, y + 2, 10, 4);
    else ctx.fillRect(x - 4, y + 3, 8, 2);
  }

  function drawPlayer(x,y,face,wingUp,carrying){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(face,1);

    ctx.fillStyle = '#49311e';
    ctx.fillRect(-10,-6,20,12);
    ctx.fillStyle = '#6f4d29';
    ctx.fillRect(-17,-2,10,7);
    ctx.fillStyle = '#f1d6a7';
    ctx.fillRect(6,-4,11,9);
    ctx.fillStyle = '#311d10';
    ctx.fillRect(-4,-14,12,10);
    ctx.fillStyle = '#181818';
    ctx.fillRect(10,-2,2,2);
    ctx.fillStyle = '#ffb347';
    ctx.fillRect(16,0,7,3);

    ctx.fillStyle = '#6a4525';
    if(wingUp){
      ctx.fillRect(-8,-18,12,12);
      ctx.fillRect(-4,7,10,7);
    }else{
      ctx.fillRect(-10,-8,14,10);
      ctx.fillRect(-8,3,14,9);
    }

    ctx.fillStyle = '#b86a2f';
    ctx.fillRect(-2,8,2,8);
    ctx.fillRect(4,8,2,8);

    if(carrying){
      ctx.fillStyle = '#ffd65d';
      ctx.fillRect(22,-8,8,8);
      ctx.fillStyle = '#ff9b39';
      ctx.fillRect(19,-3,4,2);
    }

    ctx.restore();
  }

  function drawSnack(obj){
    ctx.save();
    ctx.translate(obj.x, obj.y);
    if(obj.kind === 'cookie'){
      ctx.fillStyle = '#d99b56';
      ctx.fillRect(-7,-7,14,14);
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(-3,-3,2,2); ctx.fillRect(2,-2,2,2); ctx.fillRect(0,3,2,2);
    }else if(obj.kind === 'berry'){
      ctx.fillStyle = '#ff5f87';
      ctx.fillRect(-6,-6,12,12);
      ctx.fillStyle = '#4fa34c';
      ctx.fillRect(-2,-10,4,4);
    }else{
      ctx.fillStyle = '#89d7ff';
      ctx.fillRect(-8,-4,16,8);
      ctx.fillStyle = '#5aa5d0';
      ctx.fillRect(6,-2,4,4);
      ctx.fillRect(-10,-1,3,2);
    }
    ctx.restore();
  }

  function drawEnemy(obj){
    ctx.save();
    ctx.translate(obj.x, obj.y);
    ctx.scale(obj.vx >= 0 ? 1 : -1, 1);
    if(obj.type === 'balloon'){
      ctx.fillStyle = '#8a7cff';
      ctx.beginPath();
      ctx.arc(0, -3, 11, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff3d0';
      ctx.fillRect(-6,8,12,8);
      ctx.strokeStyle = '#ddd';
      ctx.beginPath();
      ctx.moveTo(0,8); ctx.lineTo(0,2); ctx.stroke();
    }else if(obj.type === 'bat'){
      ctx.fillStyle = '#111722';
      ctx.fillRect(-10,-4,20,8);
      ctx.fillRect(-16,-2,6,4);
      ctx.fillRect(10,-2,6,4);
      ctx.fillStyle = '#dde4f0';
      ctx.fillRect(4,-2,2,2);
    }else{
      ctx.fillStyle = '#f2b56b';
      ctx.fillRect(-8,-6,16,12);
      ctx.fillStyle = '#8a7cff';
      ctx.beginPath();
      ctx.moveTo(-18,0); ctx.lineTo(0,-18); ctx.lineTo(18,0); ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ddd';
      ctx.beginPath();
      ctx.moveTo(0,-18); ctx.lineTo(0,6); ctx.stroke();
      ctx.fillStyle = '#1b1b1b';
      ctx.fillRect(-3,-2,2,2); ctx.fillRect(1,-2,2,2);
    }
    ctx.restore();
  }

  function drawBackground(){
    var palettes = [
      {top:'#6ed0ff', bottom:'#d6f3ff', sun:'#ffe37a', cloud:'#ffffff', hill:'#7dc577'},
      {top:'#6f7de8', bottom:'#ffbf7e', sun:'#ffd25a', cloud:'#fff0da', hill:'#86b06e'},
      {top:'#1d2c5d', bottom:'#547dd8', sun:'#efe0ad', cloud:'#dce8ff', hill:'#4f8a67'},
      {top:'#152240', bottom:'#734d8a', sun:'#ffd0bd', cloud:'#e1d5ff', hill:'#4f7a62'},
      {top:'#0f1c39', bottom:'#2b5177', sun:'#f3efb8', cloud:'#cdd9ff', hill:'#345d4c'}
    ];
    var pal = palettes[(game.stage - 1) % palettes.length];
    var g, i;

    g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, pal.top);
    g.addColorStop(1, pal.bottom);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    if(game.stage >= 4){
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for(i=0;i<game.stars.length;i++){
        ctx.beginPath();
        ctx.arc(game.stars[i].x, game.stars[i].y, game.stars[i].r, 0, Math.PI*2);
        ctx.fill();
      }
    }

    ctx.fillStyle = pal.sun;
    ctx.beginPath();
    ctx.arc((game.stage % 2 ? 100 : 670), (game.stage % 3 ? 84 : 62), 30, 0, Math.PI*2);
    ctx.fill();

    for(i=0;i<game.clouds.length;i++) drawCloud(game.clouds[i].x, game.clouds[i].y, game.clouds[i].s, pal.cloud);

    ctx.fillStyle = pal.hill;
    ctx.beginPath();
    ctx.moveTo(0,355);
    ctx.quadraticCurveTo(120,290,255,346);
    ctx.quadraticCurveTo(430,280,570,348);
    ctx.quadraticCurveTo(695,305,800,338);
    ctx.lineTo(800,500);
    ctx.lineTo(0,500);
    ctx.closePath();
    ctx.fill();

    drawTree(110, 400, 128);
    drawTree(255, 404, 98);
    drawTree(445, 402, 114);
    drawTree(710, 406, 136);

    ctx.fillStyle = '#4f8b4a';
    ctx.fillRect(0, 405, W, 95);
    ctx.fillStyle = '#355f36';
    for(i=0;i<40;i++) ctx.fillRect(i * 20, 405 + (i % 2 ? 4 : 0), 10, 5);
  }

  function drawBanner(){
    if(game.banner <= 0) return;
    ctx.fillStyle = 'rgba(16,32,58,0.88)';
    ctx.fillRect(W/2 - 120, 24, 240, 44);
    ctx.strokeStyle = '#f3dd91';
    ctx.lineWidth = 3;
    ctx.strokeRect(W/2 - 120, 24, 240, 44);
    ctx.fillStyle = '#ffd24d';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('STAGE ' + game.stage, W/2, 46);
  }

  function drawGoalBar(){
    var x = 20, y = 18, w = 150, h = 10;
    var pct = game.goal ? game.feed / game.goal : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#8df0aa';
    ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = '#fff7d6';
    ctx.strokeRect(x, y, w, h);
  }

  function draw(){
    var i, visible, pt, pop;

    drawBackground();
    drawHome();

    for(i=0;i<game.snacks.length;i++) drawSnack(game.snacks[i]);
    for(i=0;i<game.enemies.length;i++) drawEnemy(game.enemies[i]);

    visible = game.invuln <= 0 || Math.floor(game.invuln / 6) % 2 === 0;
    if(game.player && visible){
      drawPlayer(game.player.x, game.player.y, game.player.face, Math.sin(game.player.flap) > 0, game.player.carrying);
    }

    for(i=0;i<game.particles.length;i++){
      pt = game.particles[i];
      ctx.globalAlpha = Math.max(0, pt.life / 52);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 13px monospace';
    for(i=0;i<game.popups.length;i++){
      pop = game.popups[i];
      ctx.globalAlpha = Math.max(0, pop.life / 54);
      ctx.fillStyle = pop.color;
      ctx.fillText(pop.text, pop.x, pop.y);
    }
    ctx.globalAlpha = 1;

    drawGoalBar();
    drawBanner();

    if(game.flash > 0){
      ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.25, game.flash / 80) + ')';
      ctx.fillRect(0,0,W,H);
    }
  }

  function loop(ts){
    var dt;
    if(!last) last = ts;
    dt = Math.min(0.033, (ts - last) / 1000);
    last = ts;
    update(dt);
    draw();
    if(state === 'playing') raf = requestAnimationFrame(loop);
  }

  function setPointer(e){
    var rect = canvas.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var cy = e.touches ? e.touches[0].clientY : e.clientY;
    pointer.x = (cx - rect.left) * (W / rect.width);
    pointer.y = (cy - rect.top) * (H / rect.height);
  }

  function bindPad(id, code){
    var el = document.getElementById(id);
    function down(e){ e.preventDefault(); keys[code] = true; }
    function up(e){ e.preventDefault(); keys[code] = false; }
    el.addEventListener('touchstart', down, {passive:false});
    el.addEventListener('touchend', up, {passive:false});
    el.addEventListener('touchcancel', up, {passive:false});
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }

  function roundRectFill(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  window.addEventListener('keydown', function(e){ keys[e.code] = true; });
  window.addEventListener('keyup', function(e){ keys[e.code] = false; });

  canvas.addEventListener('mousedown', function(e){ pointer.active = true; setPointer(e); });
  canvas.addEventListener('mousemove', function(e){ if(pointer.active) setPointer(e); });
  window.addEventListener('mouseup', function(){ pointer.active = false; });

  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); pointer.active = true; setPointer(e); }, {passive:false});
  canvas.addEventListener('touchmove', function(e){ e.preventDefault(); if(pointer.active) setPointer(e); }, {passive:false});
  canvas.addEventListener('touchend', function(){ pointer.active = false; });

  bindPad('left','ArrowLeft');
  bindPad('right','ArrowRight');
  bindPad('up','ArrowUp');
  bindPad('down','ArrowDown');

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  function drawTitleArt(){
    var g = tctx.createLinearGradient(0,0,0,titleArt.height);
    g.addColorStop(0, '#a7ddff');
    g.addColorStop(1, '#f4c67a');
    tctx.fillStyle = g;
    tctx.fillRect(0,0,titleArt.width,titleArt.height);

    tctx.fillStyle = '#4ea447';
    tctx.fillRect(0,94,220,36);
    tctx.fillStyle = '#6b4b2d';
    tctx.fillRect(138,56,52,6);
    tctx.fillStyle = '#80552f';
    roundRectFill(tctx, 148, 42, 32, 18, 8);

    tctx.fillStyle = '#f7f0a8';
    tctx.fillRect(152,34,10,10);
    tctx.fillRect(166,36,10,10);

    tctx.save();
    tctx.translate(64,54);
    tctx.scale(2.4,2.4);
    tctx.fillStyle = '#49311e'; tctx.fillRect(-10,-6,20,12);
    tctx.fillStyle = '#6f4d29'; tctx.fillRect(-17,-2,10,7);
    tctx.fillStyle = '#f1d6a7'; tctx.fillRect(6,-4,11,9);
    tctx.fillStyle = '#311d10'; tctx.fillRect(-4,-14,12,10);
    tctx.fillStyle = '#181818'; tctx.fillRect(10,-2,2,2);
    tctx.fillStyle = '#ffb347'; tctx.fillRect(16,0,7,3);
    tctx.fillStyle = '#6a4525'; tctx.fillRect(-8,-18,12,12); tctx.fillRect(-4,7,10,7);
    tctx.fillStyle = '#ffd65d'; tctx.fillRect(22,-8,8,8);
    tctx.restore();
  }

  drawTitleArt();
})();
</script>
</body>
