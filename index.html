<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ヒデちゃん八百万</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --card: #1c1c1c;
  --gold: #c9a84c;
  --gold2: #e8cc80;
  --gold-dim: rgba(201,168,76,.15);
  --text: #f0ece4;
  --muted: #7a7060;
  --hide-bg: #1e1c18;
  --hide-border: rgba(201,168,76,.25);
  --radius: 18px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); overflow: hidden; }

/* ── grain overlay ── */
body::before {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
opacity: .5;
}

#app {
display: flex; flex-direction: column; height: 100dvh;
max-width: 620px; margin: 0 auto;
position: relative; z-index: 1;
}

/* ── Header ── */
#header {
padding: 16px 20px 14px;
background: linear-gradient(180deg, #1a1710 0%, #0d0d0d 100%);
border-bottom: 1px solid rgba(201,168,76,.18);
flex-shrink: 0; position: relative; overflow: hidden;
}
#header::after {
content: ‘’;
position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
}
.hdr-inner { display: flex; align-items: center; gap: 14px; }

.hdr-av-wrap { position: relative; flex-shrink: 0; }
.hdr-av {
width: 54px; height: 54px; border-radius: 50%;
background: linear-gradient(135deg, #2a2218, #1a1710);
border: 1.5px solid var(–gold);
display: flex; align-items: center; justify-content: center;
font-size: 28px;
box-shadow: 0 0 24px rgba(201,168,76,.2), inset 0 1px 0 rgba(201,168,76,.1);
}
.hdr-av-ring {
position: absolute; inset: -4px; border-radius: 50%;
border: 1px solid rgba(201,168,76,.2);
animation: ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse {
0%,100% { opacity:.3; transform: scale(1); }
50% { opacity:.8; transform: scale(1.04); }
}
.status-dot {
position: absolute; bottom: 2px; right: 2px;
width: 10px; height: 10px; border-radius: 50%;
background: #4ade80; border: 2px solid #0d0d0d;
box-shadow: 0 0 6px #4ade80;
animation: sblink 2.5s ease-in-out infinite;
}
@keyframes sblink { 0%,100%{opacity:1} 50%{opacity:.3} }

.hdr-txt { flex: 1; }
.hdr-name {
font-size: 18px; font-weight: 900; color: var(–text);
letter-spacing: .06em;
text-shadow: 0 0 20px rgba(201,168,76,.3);
}
.hdr-name span { color: var(–gold); font-family: ‘Cormorant Garamond’, serif; font-style: italic; font-size: 20px; }
.hdr-sub { font-size: 10px; color: var(–muted); margin-top: 3px; letter-spacing: .1em; }

/* BGM button */
#bgm-btn {
background: var(–gold-dim); border: 1px solid var(–gold);
color: var(–gold); border-radius: 20px; padding: 6px 12px;
font-size: 11px; font-family: inherit; cursor: pointer;
transition: all .2s; letter-spacing: .06em; font-weight: 700;
white-space: nowrap;
}
#bgm-btn:hover { background: rgba(201,168,76,.25); }
#bgm-btn.playing { background: rgba(201,168,76,.2); box-shadow: 0 0 10px rgba(201,168,76,.3); }

/* ── Messages ── */
#messages {
flex: 1; overflow-y: auto; padding: 20px 16px 10px;
display: flex; flex-direction: column; gap: 16px;
scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: rgba(201,168,76,.2); border-radius: 3px; }

.msg-row { display: flex; gap: 10px; align-items: flex-end; animation: msgin .35s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes msgin { from{opacity:0;transform:translateY(16px) scale(.95)} to{opacity:1;transform:none} }
.msg-row.user { flex-direction: row-reverse; }

.avatar {
width: 36px; height: 36px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 18px; flex-shrink: 0;
}
.avatar.hide {
background: linear-gradient(135deg, #2a2218, #1a1710);
border: 1px solid rgba(201,168,76,.4);
box-shadow: 0 0 12px rgba(201,168,76,.15);
}
.avatar.user {
background: linear-gradient(135deg, #1a2030, #0d1525);
border: 1px solid rgba(100,130,200,.3);
}

.bubble-wrap { max-width: calc(100% - 54px); display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .bubble-wrap { align-items: flex-end; }
.sender-name { font-size: 10px; font-weight: 700; color: var(–muted); padding: 0 6px; letter-spacing: .08em; }

.bubble {
padding: 12px 16px; font-size: 14px; line-height: 1.8;
font-weight: 500; word-break: break-word; white-space: pre-wrap;
border-radius: 4px 18px 18px 18px;
}
.bubble.hide {
background: var(–hide-bg);
border: 1px solid var(–hide-border);
color: var(–text);
box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(201,168,76,.05);
}
.bubble.user {
background: linear-gradient(135deg, #1a2030, #151d2e);
border: 1px solid rgba(100,130,200,.2);
color: var(–text);
border-radius: 18px 4px 18px 18px;
box-shadow: 0 4px 20px rgba(0,0,0,.4);
}

/* quote decoration */
.bubble.hide::before {
content: ‘”’;
font-family: ‘Cormorant Garamond’, serif;
font-size: 36px; line-height: 0;
color: rgba(201,168,76,.2);
position: relative; top: 8px; margin-right: 4px;
vertical-align: middle;
}

/* Typing */
.typing-row { display: flex; gap: 10px; align-items: flex-end; }
.typing-bbl {
background: var(–hide-bg); border: 1px solid var(–hide-border);
padding: 14px 18px; border-radius: 4px 18px 18px 18px;
display: flex; gap: 6px; align-items: center;
}
.td { width: 6px; height: 6px; border-radius: 50%; background: var(–gold); animation: tdot 1.3s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes tdot { 0%,80%,100%{opacity:.15;transform:scale(.7)} 40%{opacity:1;transform:scale(1)} }

/* ── Choices ── */
#choices {
padding: 12px 14px 14px;
background: linear-gradient(180deg, #0d0d0d 0%, #111008 100%);
border-top: 1px solid rgba(201,168,76,.1);
display: flex; flex-direction: column; gap: 8px;
flex-shrink: 0;
}
#choices-label {
font-size: 9px; color: var(–muted); letter-spacing: .14em;
text-transform: uppercase; padding: 0 2px; font-weight: 700;
}
.choice-btn {
background: transparent;
border: 1px solid rgba(201,168,76,.22);
color: #c8bfa0;
padding: 10px 16px; border-radius: 8px;
font-size: 13px; font-family: inherit; cursor: pointer;
transition: all .18s; font-weight: 500; text-align: left;
line-height: 1.4; letter-spacing: .02em;
position: relative; overflow: hidden;
}
.choice-btn::before {
content: ‘’;
position: absolute; left: 0; top: 0; bottom: 0;
width: 2px;
background: linear-gradient(180deg, transparent, var(–gold), transparent);
opacity: 0; transition: opacity .2s;
}
.choice-btn:hover {
border-color: rgba(201,168,76,.6);
color: var(–gold2);
background: var(–gold-dim);
transform: translateX(4px);
}
.choice-btn:hover::before { opacity: 1; }
.choice-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

/* Reset */
#reset-btn {
margin: 4px 14px 10px;
background: transparent; border: 1px solid rgba(255,255,255,.06);
color: var(–muted); padding: 8px; border-radius: 8px;
font-size: 11px; font-family: inherit; cursor: pointer;
transition: all .15s; letter-spacing: .06em;
}
#reset-btn:hover { border-color: rgba(201,168,76,.3); color: var(–gold); }

/* ── Divider label ── */
.day-divider {
text-align: center; font-size: 10px; color: var(–muted);
letter-spacing: .1em; position: relative; margin: 4px 0;
}
.day-divider::before, .day-divider::after {
content: ‘’;
position: absolute; top: 50%; width: 30%;
height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,.15));
}
.day-divider::before { left: 0; }
.day-divider::after { right: 0; transform: scaleX(-1); }
</style>

</head>
<body>
<div id="app">

  <!-- Header -->

  <div id="header">
    <div class="hdr-inner">
      <div class="hdr-av-wrap">
        <div class="hdr-av">👩‍💼</div>
        <div class="hdr-av-ring"></div>
        <div class="status-dot"></div>
      </div>
      <div class="hdr-txt">
        <div class="hdr-name"><span>Hidechan</span> 八百万</div>
        <div class="hdr-sub">⌚ WATCH CONNOISSEUR · ▶ TREND ORACLE · 💼 CEO MENTOR</div>
      </div>
      <button id="bgm-btn" onclick="toggleBGM()">♪ BGM</button>
    </div>
  </div>

  <!-- Messages -->

  <div id="messages">
    <div class="day-divider">— 相談室へようこそ —</div>
  </div>

  <!-- Choices -->

  <div id="choices">
    <div id="choices-label">Select a topic</div>
  </div>
  <button id="reset-btn" onclick="resetChat()">↺ はじめからやり直す</button>

</div>

<script>
// ============================================================
//  BALINESE-STYLE GENERATIVE BGM
//  ガムランの音律（スレンドロ音階）+ 鐘 + ドローン + パーカッション
// ============================================================
let audioCtx = null;
let bgmPlaying = false;
let bgmNodes = [];

// スレンドロ音階（バリガムラン風：5音）
const SLENDRO = [261.63, 294.33, 349.23, 392.00, 466.16]; // C D F G A♭
const SLENDRO2 = SLENDRO.map(f => f * 2);
const SLENDRO_LOW = SLENDRO.map(f => f / 2);

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function makeMaster() {
  const ctx = getCtx();
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 3);
  master.connect(ctx.destination);
  return master;
}

// リバーブ（コンボリューションリバーブの簡易版）
function makeReverb(ctx, seconds = 3) {
  const convolver = ctx.createConvolver();
  const length = ctx.sampleRate * seconds;
  const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

// ガムラン系金属打楽器トーン
function playGong(ctx, dest, freq, time, vol = 0.12, dur = 2.5) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const osc2 = ctx.createOscillator();
  const gain2 = ctx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, time);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.98, time + dur);

  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2.756, time); // 倍音（ガムラン特有）
  osc2.frequency.exponentialRampToValueAtTime(freq * 2.73, time + dur);

  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
  gain2.gain.setValueAtTime(vol * 0.4, time);
  gain2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.7);

  osc.connect(gain); gain.connect(dest);
  osc2.connect(gain2); gain2.connect(dest);
  osc.start(time); osc.stop(time + dur + 0.1);
  osc2.start(time); osc2.stop(time + dur * 0.7 + 0.1);
}

// ドローン（持続低音）
function startDrone(ctx, dest) {
  const freqs = [SLENDRO_LOW[0], SLENDRO_LOW[2]];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, ctx.currentTime);
    // ゆっくりビート（うなり）
    osc.frequency.setValueAtTime(f + (i === 0 ? 0.3 : -0.2), ctx.currentTime + 4);
    osc.frequency.setValueAtTime(f, ctx.currentTime + 8);
    gain.gain.setValueAtTime(0.04, ctx.currentTime);
    osc.connect(gain); gain.connect(dest);
    osc.start();
    bgmNodes.push(osc, gain);
  });
}

// バリ風パーカッション（チャック音）
function schedulePercussion(ctx, dest, startTime, endTime) {
  const patterns = [0, 0.5, 1.0, 1.5, 2.0, 2.25, 2.5, 3.0, 3.5, 3.75];
  let t = startTime;
  function tick() {
    if (!bgmPlaying) return;
    patterns.forEach(offset => {
      const time = t + offset;
      if (time > endTime) return;
      // wood block 風
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.008));
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain();
      const vol = offset === 0 ? 0.06 : (offset % 1 === 0 ? 0.04 : 0.02);
      g.gain.setValueAtTime(vol, time);
      src.connect(g); g.connect(dest);
      src.start(time);
    });
    t += 4;
    if (t < endTime) setTimeout(tick, 3800);
  }
  tick();
}

// メロディシーケンス（ガムランの旋律）
function scheduleMelody(ctx, dest, startTime, endTime) {
  // ガムランらしいインターロッキングパターン
  const pattern1 = [0,2,1,3,2,4,3,2,1,0,2,3]; // スレンドロインデックス
  const pattern2 = [2,4,3,4,2,1,3,4,3,2,4,1];
  const noteLen = 0.42;

  let t = startTime;
  function tick() {
    if (!bgmPlaying || t > endTime) return;
    const beat = Math.floor((t - startTime) / noteLen) % pattern1.length;
    const f1 = SLENDRO2[pattern1[beat]];
    const f2 = SLENDRO2[pattern2[beat]];
    playGong(ctx, dest, f1, t, 0.06, 0.8);
    if (beat % 3 === 0) playGong(ctx, dest, f2, t + noteLen * 0.5, 0.04, 0.8);
    t += noteLen;
    const delay = (t - ctx.currentTime) * 1000 - 50;
    setTimeout(tick, Math.max(0, delay));
  }
  tick();
}

// 低音ゴング（アクセント）
function scheduleBass(ctx, dest, startTime, endTime) {
  const bassPattern = [0, 2, 0, 4, 2, 0, 3, 0];
  let step = 0;
  let t = startTime;
  function tick() {
    if (!bgmPlaying || t > endTime) return;
    playGong(ctx, dest, SLENDRO_LOW[bassPattern[step % bassPattern.length]], t, 0.09, 3.5);
    step++;
    t += 2.0 + (step % 3 === 0 ? 0.5 : 0);
    const delay = (t - ctx.currentTime) * 1000 - 50;
    setTimeout(tick, Math.max(0, delay));
  }
  tick();
}

// 高音チャイム（アクセント）
function scheduleChime(ctx, dest, startTime, endTime) {
  let t = startTime + 1.5;
  function tick() {
    if (!bgmPlaying || t > endTime) return;
    const idx = Math.floor(Math.random() * SLENDRO.length);
    playGong(ctx, dest, SLENDRO2[idx] * 2, t, 0.05, 1.2);
    t += 3 + Math.random() * 4;
    const delay = (t - ctx.currentTime) * 1000 - 50;
    setTimeout(tick, Math.max(0, delay));
  }
  tick();
}

function startBGM() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') ctx.resume();

  bgmPlaying = true;
  const master = makeMaster();
  bgmNodes.push(master);

  const reverb = makeReverb(ctx, 4);
  reverb.connect(master);

  const dryGain = ctx.createGain();
  dryGain.gain.setValueAtTime(0.4, ctx.currentTime);
  dryGain.connect(master);

  const wetGain = ctx.createGain();
  wetGain.gain.setValueAtTime(0.6, ctx.currentTime);
  wetGain.connect(reverb);

  // ミックスバス
  const mix = ctx.createGain();
  mix.connect(dryGain);
  mix.connect(wetGain);

  const duration = 9999;
  const now = ctx.currentTime + 0.1;

  startDrone(ctx, mix);
  scheduleMelody(ctx, mix, now, now + duration);
  scheduleBass(ctx, mix, now + 0.2, now + duration);
  scheduleChime(ctx, mix, now + 1, now + duration);
  schedulePercussion(ctx, mix, now, now + duration);

  document.getElementById('bgm-btn').textContent = '♪ ON';
  document.getElementById('bgm-btn').classList.add('playing');
}

function stopBGM() {
  bgmPlaying = false;
  bgmNodes.forEach(n => {
    try { n.stop ? n.stop() : n.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  document.getElementById('bgm-btn').textContent = '♪ BGM';
  document.getElementById('bgm-btn').classList.remove('playing');
}

function toggleBGM() {
  bgmPlaying ? stopBGM() : startBGM();
}

// ============================================================
//  CONVERSATION TREE
// ============================================================
const TREE = {
  start: {
    hide: "——\n私はヒデちゃん八百万。\n何でも話して。仕事でも、恋愛でも、将来でも。\n…時計とYouTubeの話も、いつでも歓迎よ。",
    choices: [
      { label: "💼 仕事の悩みを話したい", next: "work_top" },
      { label: "👥 人間関係について", next: "human_top" },
      { label: "💕 恋愛のこと", next: "love_top" },
      { label: "🔮 将来・キャリアのこと", next: "future_top" },
      { label: "😔 なんかしんどい", next: "tired_top" },
      { label: "⌚ 時計の話を聞きたい", next: "watch_top" },
      { label: "▶ YouTubeトレンドを教えて", next: "youtube_top" },
    ]
  },

  // ── 仕事 ──
  work_top: {
    hide: "仕事ね。\nどんな状況？",
    choices: [
      { label: "上司がとにかくしんどい", next: "work_boss" },
      { label: "やる気がまったく出ない", next: "work_motivation" },
      { label: "転職を真剣に考えてる", next: "work_transfer" },
      { label: "残業・業務量が限界", next: "work_busy" },
      { label: "評価されてない気がする", next: "work_noreward" },
    ]
  },
  work_boss: {
    hide: "上司か。\nどんなタイプ？",
    choices: [
      { label: "細かすぎるマイクロマネジメント", next: "work_boss_micro" },
      { label: "感情的で怒鳴ってくる", next: "work_boss_anger" },
      { label: "手柄を横取りしてくる", next: "work_boss_steal" },
    ]
  },
  work_boss_micro: {
    hide: "細かい上司、わかるわ。\nIWCのインジュニアみたいなもの——精度は高いけど、使う側に余白がない。\n先に細かく報告すると、向こうが安心して口数が減る。先手を打つの。",
    choices: [
      { label: "試してみる", next: "work_encourage" },
      { label: "もう少し聞かせて", next: "work_boss_micro2" },
      { label: "別の話題へ", next: "start" },
    ]
  },
  work_boss_micro2: {
    hide: "もうひとつ言うなら。\n上司がマイクロマネジメントするのは、本人が不安だから。\n『ここまで完了です、どうですか？』って細かく確認を入れると、相手は管理できてると感じて落ち着く。\n本質を理解して動くのが、一番スマートよ。",
    choices: [
      { label: "視点が変わった", next: "work_encourage" },
      { label: "別の話題へ", next: "start" },
    ]
  },
  work_boss_anger: {
    hide: "感情的な人間は相手にしない。\nグランドセイコーが嵐の日でも静かに正確に動き続けるみたいに——自分のリズムを崩さないこと。\n怒鳴りは相手の問題。あなたのものじゃないわ。",
    choices: [
      { label: "少し楽になった", next: "work_encourage" },
      { label: "でも限界かもしれない", next: "work_limit" },
      { label: "別の話題へ", next: "start" },
    ]
  },
  work_boss_steal: {
    hide: "横取りね。古典的な手口だけど、対策は単純。\nメール、チャット、議事録——あらゆるところに『自分がやった』という記録を残す。\nロレックスのデイトジャストじゃないけれど、日付と事実は正直なの。",
    choices: [
      { label: "記録を残す習慣をつける", next: "work_encourage" },
      { label: "もう転職したい", next: "work_transfer" },
      { label: "別の話題へ", next: "start" },
    ]

// ============================================================
//  UI LOGIC
// ============================================================
function addBubble(who, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (who === 'user' ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'avatar ' + (who === 'hide' ? 'hide' : 'user');
  av.textContent = who === 'hide' ? '👩‍💼' : '👤';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const sn = document.createElement('div');
  sn.className = 'sender-name';
  sn.textContent = who === 'hide' ? 'Hidechan 八百万' : 'You';

  const bbl = document.createElement('div');
  bbl.className = 'bubble ' + (who === 'hide' ? 'hide' : 'user');
  bbl.textContent = text;

  wrap.append(sn, bbl);
  row.append(av, wrap);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.id = 'typing';
  wrap.className = 'typing-row';
  const av = document.createElement('div');
  av.className = 'avatar hide';
  av.textContent = '👩‍💼';
  const bbl = document.createElement('div');
  bbl.className = 'typing-bbl';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'td';
    bbl.appendChild(d);
  }
  wrap.append(av, bbl);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

function renderChoices(nodeId) {
  const node = TREE[nodeId];
  if (!node) return;
  const el = document.getElementById('choices');
  el.innerHTML = '<div id="choices-label">Select a topic</div>';
  node.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => choose(c.label, c.next);
    el.appendChild(btn);
  });
}

function choose(label, nextId) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  addBubble('user', label);
  showTyping();
  setTimeout(() => {
    hideTyping();
    const node = TREE[nextId] || TREE['start'];
    addBubble('hide', node.hide);
    renderChoices(nextId in TREE ? nextId : 'start');
  }, 600 + Math.random() * 500);
}

function resetChat() {
  document.getElementById('messages').innerHTML = '<div class="day-divider">— 相談室へようこそ —</div>';
  const node = TREE['start'];
  addBubble('hide', node.hide);
  renderChoices('start');
}

window.addEventListener('DOMContentLoaded', () => {
  const node = TREE['start'];
  addBubble('hide', node.hide);
  renderChoices('start');
});
</script>
