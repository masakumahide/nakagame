<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぶぶのお気軽トーク</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:linear-gradient(180deg,#fff6fb,#eef6ff);
  color:#444;
}

.container{
  max-width:420px;
  margin:0 auto;
  padding:20px;
}

/* ===== キャラ ===== */
.kobubu{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.kobubu img{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.kobubu-name{
  font-weight:600;
  font-size:16px;
}

/* ===== 会話 ===== */
.message{
  background:#fff;
  padding:16px;
  border-radius:16px;
  line-height:1.7;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  margin-bottom:16px;
}

/* ===== 選択肢 ===== */
.choices{
  display:grid;
  gap:10px;
}

.choice{
  background:#fff;
  border:none;
  padding:16px;
  border-radius:16px;
  text-align:left;
  font-size:15px;
  box-shadow:0 8px 18px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:.2s;
}

.choice:hover{
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

  <!-- キャラ -->
  <div class="kobubu">
    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400" id="avatar">
    <div class="kobubu-name">こぶぶ</div>
  </div>

  <!-- 会話 -->
  <div class="message" id="message">
    ねえ、今日はどんな感じ？
  </div>

  <!-- 選択肢 -->
  <div class="choices" id="choices"></div>

</div>

<script>

const flow = [
  {
    text: "ねえ、今日はどんな感じ？",
    choices: ["ちょっと疲れてる","焦って空回り","前向きに整えたい","なんとなく話したい"]
  },
  {
    text: (a)=>`そっか、${a}なんだね。\nちょっとだけ深掘りしてもいい？`,
    choices: ["うん","まあ少しだけ","まだ整理できてない"]
  },
  {
    text: ()=>"今いちばん引っかかってるのって、どれに近い？",
    choices: ["人","仕事","自分","よくわからない"]
  },
  {
    text: ()=>"いいね、その感じ。\nじゃあ今日は、小さく一歩だけ決めよっか。",
    choices: ["10分だけやる","誰かに連絡","今日は休む"]
  }
];

let step = 0;

function render(){
  const data = flow[step];

  document.getElementById("message").innerText =
    typeof data.text === "function" ? data.text(last) : data.text;

  const c = document.getElementById("choices");
  c.innerHTML = "";

  data.choices.forEach(choice=>{
    const btn = document.createElement("button");
    btn.className="choice";
    btn.innerText = choice;

    btn.onclick = ()=>{
      last = choice;
      step++;

      if(step < flow.length){
        render();
      }else{
        end();
      }
    };

    c.appendChild(btn);
  });
}

  document.getElementById("message").innerText =

  document.getElementBy
