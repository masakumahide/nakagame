<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こぶぶのお気軽トーク</title>
  <style>
    :root {
      --bg-a: #fffafc;
      --bg-b: #f5efff;
      --bg-c: #eef8ff;
      --panel: rgba(255,255,255,0.86);
      --panel-strong: rgba(255,255,255,0.95);
      --line: rgba(120, 100, 180, 0.12);
      --text: #51456f;
      --muted: #8578a4;
      --pink: #ff9fcf;
      --lav: #bda8ff;
      --sky: #bfe7ff;
      --gold: #ffd67f;
      --shadow: 0 16px 34px rgba(124, 103, 170, 0.14);
      --shadow-soft: 0 10px 24px rgba(124, 103, 170, 0.09);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255,159,207,0.24), transparent 22%),
        radial-gradient(circle at 88% 12%, rgba(191,231,255,0.30), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(189,168,255,0.18), transparent 35%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b) 48%, var(--bg-c));
      overflow-x: hidden;
    }

    .stars, .petals, .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: twinkle 3.1s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.18; transform: scale(0.75); }
      50% { opacity: 1; transform: scale(1.45); }
    }

    .petal {
      position: absolute;
      width: 12px;
      height: 18px;
      border-radius: 14px 14px 14px 3px;
      background: linear-gradient(180deg, rgba(255,188,221,0.95), rgba(255,140,181,0.72));
      opacity: 0.72;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
      12% { opacity: 0.72; }
      100% { transform: translateY(110vh) translateX(54px) rotate(330deg); opacity: 0; }
    }

    .shell {
      width: min(820px, calc(100vw - 10px));
      margin: 0 auto;
      min-height: 100vh;
      padding: 10px 0 20px;
      position: relative;
      z-index: 1;
    }

    .app {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.60);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .topbar {
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(120,100,180,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.18));
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mini-face {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,242,255,0.85));
      border: 1px solid rgba(255,255,255,0.92);
      box-shadow: var(--shadow-soft);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .mini-face span {
      font-size: 24px;
      filter: drop-shadow(0 2px 4px rgba(120,100,180,0.16));
    }

    .title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #6c5289;
      margin-bottom: 3px;
    }

    .subtitle {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill,
    .soft-btn,
    .primary,
    .choice-btn,
    .ghost-btn,
    .send-btn,
    .card-btn {
      appearance: none;
      border: 1px solid rgba(120,100,180,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.76));
      color: var(--text);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      font-weight: 800;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 8px 12px;
      font-size: 12px;
      color: #6b5a8b;
    }

    .pill strong { color: #5b4279; }

    .soft-btn,
    .primary,
    .choice-btn,
    .ghost-btn,
    .send-btn,
    .card-btn {
      cursor: pointer;
      padding: 12px 14px;
    }

    .soft-btn:hover,
    .primary:hover,
    .choice-btn:hover,
    .ghost-btn:hover,
    .send-btn:hover,
    .card-btn:hover { transform: translateY(-1px); border-color: rgba(120,100,180,0.22); }

    .soft-btn:active,
    .primary:active,
    .choice-btn:active,
    .ghost-btn:active,
    .send-btn:active,
    .card-btn:active { transform: translateY(1px) scale(0.99); }

    .primary,
    .send-btn {
      background: linear-gradient(180deg, rgba(255,214,127,0.94), rgba(255,159,207,0.86));
      color: #5e4578;
      border-color: rgba(255,214,127,0.24);
    }

    .progress-area {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(120,100,180,0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,214,127,0.98), rgba(255,159,207,0.92), rgba(191,231,255,0.92));
      transition: width 0.28s ease;
    }

    
    .main {
      padding: 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
      min-height: 760px;
    }

    .chat-screen,
    .summary-screen,
    .finale-screen,
    .input-card {
      background: var(--panel-strong);
      border: 1px solid rgba(120,100,180,0.09);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
    }

    .chat-screen,
    .summary-screen,
    .finale-screen {
      padding: 14px;
      min-height: 520px;
    }

    .chat-screen[hidden],
    .summary-screen[hidden],
    .finale-screen[hidden],
    .input-card[hidden] {
      display: none;
    }

    .screen-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
      color: #6a4c87;
    }

    .section-sub {
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      margin-top: 4px;
    }

    .chat-log {
      display: grid;
      gap: 10px;
      min-height: 340px;
      max-height: 460px;
      overflow: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg.ai { justify-content: flex-start; }
    .msg.user { justify-content: flex-end; }

    .msg-bubble {
      max-width: min(78%, 720px);
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.72;
      font-size: 14px;
      white-space: pre-wrap;
      box-shadow: var(--shadow-soft);
    }

    .msg.ai .msg-bubble {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,244,255,0.92));
      border: 1px solid rgba(120,100,180,0.10);
      color: #55476f;
      border-top-left-radius: 8px;
    }

    .msg.user .msg-bubble {
      background: linear-gradient(180deg, rgba(255,214,127,0.94), rgba(255,159,207,0.82));
      border: 1px solid rgba(255,214,127,0.24);
      color: #5e4578;
      border-top-right-radius: 8px;
    }

    .action-area {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .typing-box,
    .question-box,
    .summary-body,
    .final-body {
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
      border: 1px solid rgba(120,100,180,0.08);
      color: #5c4c76;
      box-shadow: var(--shadow-soft);
    }

    .question-box,
    .summary-body,
    .final-body {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .typing-box {
      display: none;
      font-size: 14px;
      color: #8a7ba6;
    }

    .typing-box.show { display: block; }

    .choice-grid,
    .utility-row,
    .summary-actions {
      display: grid;
      gap: 10px;
    }

    .choice-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice-btn {
      min-height: 60px;
      text-align: left;
      line-height: 1.45;
      color: #5a4a72;
    }

    .utility-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .ghost-btn {
      font-size: 12px;
      color: #5d4c77;
    }

    .summary-actions {
      margin-top: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .input-card {
      padding: 14px;
    }

    .input-title {
      font-size: 13px;
      font-weight: 900;
      color: #6a4c87;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .input-card textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(120,100,180,0.12);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      font: inherit;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
    }

    .input-actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hint-text {
      font-size: 12px;
      color: var(--muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .card-btn {
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      font-size: 30px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 26%, rgba(255,255,255,0.54), transparent 20%),
        linear-gradient(180deg, rgba(255,214,127,0.44), rgba(255,159,207,0.28), rgba(191,231,255,0.34));
      color: #5f4a7d;
    }

    .card-btn::after {
      content: "✦";
      position: absolute;
      font-size: 64px;
      color: rgba(255,255,255,0.26);
      pointer-events: none;
    }

    .card-btn.active {
      border-color: rgba(255,214,127,0.38);
      box-shadow: 0 0 0 3px rgba(255,214,127,0.14), var(--shadow-soft);
      transform: translateY(-2px);
    }

    .card-btn[disabled] {
      opacity: 0.55;
      cursor: default;
      transform: none;
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.98), rgba(255,214,127,0.82) 54%, rgba(255,159,207,0.22) 78%, transparent 80%);
      animation: particleFly 840ms ease-out forwards;
      pointer-events: none;
      z-index: 30;
    }

    @keyframes particleFly {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to { transform: translate(var(--dx), var(--dy)) scale(0.24); opacity: 0; }
    }

    @media (max-width: 640px) {
      .shell { width: min(100vw - 8px, 100%); padding-top: 6px; }
      .topbar, .main { padding-left: 10px; padding-right: 10px; }
      .step-row { gap: 6px; }
      .step-chip { font-size: 10px; padding: 7px 4px; }
      .choice-grid, .utility-row, .summary-actions { grid-template-columns: 1fr; }
      .card-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
      .msg-bubble { max-width: 88%; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="petals" id="petals"></div>
  <div class="particles" id="particles"></div>

  <main class="shell">
    <section class="app">
      <div class="topbar">
        <div class="top-row">
          <div class="brand">
            <div class="mini-face"><span>🫧</span></div>
            <div>
              <div class="title">こぶぶのお気軽トーク</div>
              <div class="subtitle">選んで進める、シンプルなトーク</div>
            </div>
          </div>
          <div class="meta">
            <div class="pill"><strong id="etaLabel">約5分</strong></div>
            <div class="pill">現在: <strong id="stepLabel">はじめに</strong></div>
            <button id="bgmBtn" class="primary">♪ BGM ON</button>
          </div>
        </div>
        <div class="progress-area">
          <div class="progress-head">
            <span id="progressText">1 / 6</span>
            <span id="modeText">選んで進む</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>

      <div class="main">
        <section class="chat-screen" id="chatScreen">
          <div class="screen-head">
            <div>
              <h2 class="section-title">トーク</h2>
              <div class="section-sub">選ぶだけで進みます。</div>
            </div>
            <div class="pill" id="phasePill">1 / 6</div>
          </div>

          <div class="chat-log" id="chatLog"></div>

          <div class="action-area">
            <div class="typing-box" id="typingBox">こぶぶが考え中…</div>
            <div class="question-box" id="questionBox">今の気分にいちばん近いものを選んでください。</div>
            <div class="choice-grid" id="choiceGrid"></div>
            <div class="utility-row" id="utilityRow" hidden></div>
          </div>
        </section>

        <section class="summary-screen" id="summaryScreen" hidden>
          <div class="screen-head">
            <div>
              <h2 class="section-title" id="summaryTitle">途中の総括</h2>
              <div class="section-sub" id="summarySub">ここまでをまとめます。</div>
            </div>
            <div class="pill" id="summaryPill">中間まとめ</div>
          </div>
          <div class="summary-body" id="summaryBody">総括はここに表示されます。</div>
          <div class="summary-actions" id="summaryActions"></div>
        </section>

        <section class="finale-screen" id="finaleScreen" hidden>
          <div class="screen-head">
            <div>
              <h2 class="section-title">最後のタロット</h2>
              <div class="section-sub">最後に1枚だけ選びます。</div>
            </div>
            <div class="pill">FINAL</div>
          </div>
          <div class="card-grid" id="cardGrid"></div>
          <div class="final-body" id="finalBody">1枚選ぶと、そのまま総括画面へ進みます。</div>
        </section>

        <section class="input-card" id="inputCard" hidden></section>
      </div>
    </section>
  </main>

  <script>
    const stars = document.getElementById('stars');
    const petals = document.getElementById('petals');
    const particles = document.getElementById('particles');
        const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const stepLabel = document.getElementById('stepLabel');
    const modeText = document.getElementById('modeText');
    const etaLabel = document.getElementById('etaLabel');
    const phasePill = document.getElementById('phasePill');
    const chatScreen = document.getElementById('chatScreen');
    const summaryScreen = document.getElementById('summaryScreen');
    const finaleScreen = document.getElementById('finaleScreen');
    const chatLog = document.getElementById('chatLog');
    const typingBox = document.getElementById('typingBox');
    const questionBox = document.getElementById('questionBox');
    const choiceGrid = document.getElementById('choiceGrid');
    const utilityRow = document.getElementById('utilityRow');
    const inputCard = document.getElementById('inputCard');
    const freeInput = document.getElementById('freeInput');
    const sendBtn = document.getElementById('sendBtn');
    const skipBtn = document.getElementById('skipBtn');
    const summaryTitle = document.getElementById('summaryTitle');
    const summarySub = document.getElementById('summarySub');
    const summaryPill = document.getElementById('summaryPill');
    const summaryBody = document.getElementById('summaryBody');
    const summaryActions = document.getElementById('summaryActions');
    const cardGrid = document.getElementById('cardGrid');
    const finalBody = document.getElementById('finalBody');
    const bgmBtn = document.getElementById('bgmBtn');
    const hintText = document.getElementById('hintText');

    for (let i = 0; i < 64; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = `${Math.random() * 100}%`;
      s.style.top = `${Math.random() * 100}%`;
      s.style.animationDelay = `${Math.random() * 3}s`;
      s.style.opacity = Math.random() * 0.8 + 0.2;
      stars.appendChild(s);
    }

    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = `${Math.random() * 100}%`;
      p.style.animationDuration = `${8 + Math.random() * 10}s`;
      p.style.animationDelay = `${Math.random() * 8}s`;
      p.style.transform = `scale(${0.7 + Math.random() * 0.8})`;
      petals.appendChild(p);
    }

    const steps = [
      { name: 'はじめに', mode: '気分確認', question: '今の気分にいちばん近いものを選んでください。', replies: ['ちょっと疲れてる', '焦って空回り', '前向きに整えたい', 'なんとなく話したい'] },
      { name: '状況', mode: '現状整理', question: 'いま一番ひっかかっているのは、どのあたりですか？', replies: ['優先順位が散ってる', '気持ちが重い', '人間関係が気になる', '自分の軸がぶれる'] },
      { name: '本音', mode: '気持ち確認', question: '本当は、どんな状態に近づきたいですか？', replies: ['落ち着いて動きたい', 'はっきり決めたい', '自信を戻したい', 'やさしく前進したい'] },
      { name: '寄り道', mode: 'ひと息', question: '少し寄り道するなら、いま欲しいのはどれですか？', replies: ['偉人の言葉がほしい', '腕時計の蘊蓄が聞きたい', 'やさしい助言がほしい', 'そのまま続けたい'] },
      { name: '一手', mode: '行動決定', question: '今日の自分に、ひとつだけ行動を渡すなら？', replies: ['10分だけ着手する', '連絡を1本送る', 'やらないことを決める', '先に休む'] },
      { name: '締め前', mode: 'まとめ', question: '最後に、どんな温度感で会話を閉じたいですか？', replies: ['やさしく終えたい', '背中を押してほしい', '静かに整えたい', '少し元気に締めたい'] }
    ];

    const philosopherQuotes = [
      { who: 'エピクテトス', line: '「人を動揺させるのは出来事そのものではなく、その受け取り方である」※意訳', tip: 'まず事実と解釈を分けると、心のノイズが少し減ります。' },
      { who: 'マルクス・アウレリウス', line: '「行く手をふさぐものが、かえって道になる」※意訳', tip: '障害を全部消すより、条件として扱うほうが前に進みやすいです。' },
      { who: 'セネカ', line: '「難しいから挑まないのではない。挑まないから難しいのだ」※意訳', tip: '不安が消えるのを待つより、サイズを小さくして始めるほうが現実的です。' },
      { who: '老子', line: '「千里の道も一歩から」', tip: '大きい悩みほど、今日中に終わる単位に切ると動けます。' },
      { who: 'ソクラテス', line: '「吟味されない生は、生きるに値しない」※短訳', tip: '答えがぼやけるときは、問いの立て方を見直す価値があります。' }
    ];

    const watchTrivia = [
      { who: 'WATCH TRIVIA', line: '機械式腕時計はゼンマイを動力にして、てんぷという調速機構で進みます。', tip: '魅力は電子の正確さではなく、機械が動き続ける気配そのものです。' },
      { who: 'WATCH TRIVIA', line: 'クロノグラフは時間を測る追加機構で、三針より構造が複雑です。', tip: '見た目の情報量が増えるので、道具感やメカ感が強く出ます。' },
      { who: 'WATCH TRIVIA', line: 'ダイバーズウォッチは回転ベゼルで経過時間を読む設計が代表的です。', tip: '実用品としての理屈が、そのままデザインの魅力になっています。' },
      { who: 'WATCH TRIVIA', line: 'ケース径だけでなく、ラグ・トゥ・ラグの長さで装着感は大きく変わります。', tip: '数字だけではなく、腕にどう収まるかを見るのが本質です。' },
      { who: 'WATCH TRIVIA', line: 'サファイアクリスタルは硬度が高く、日常の擦り傷に強い素材です。', tip: '透明感と実用性を両立しやすいのが人気の理由の一つです。' }
    ];

    const softAdvice = [
      '急いで全部を整えなくても大丈夫です。今日は一つだけでも進めば十分です。',
      '悩みが大きく見える日は、やることを減らしたほうがむしろ前へ進みます。',
      'やさしさは甘さではありません。心を守りながら進むための技術です。',
      'ちゃんと疲れている日は、判断より回復を優先したほうが得なこともあります。',
      '頭の中だけで整理しようとすると重くなりやすいので、言葉にすると楽になります。'
    ];

    const tarotDeck = [
      { icon: '☀️', name: '太陽', msg: '迷う時間を少し短くすると、流れが動きます。' },
      { icon: '🌙', name: '月', msg: '不安は敵ではなく、まだ言葉になっていない感覚です。' },
      { icon: '⭐', name: '星', msg: '理想は分解すると、現実の一歩に変わります。' },
      { icon: '🗡️', name: '剣', msg: '曖昧な優しさより、明確な線引きが助けになります。' },
      { icon: '🌸', name: '桜', msg: '急いで咲くより、整って咲くほうが長く持ちます。' },
      { icon: '👑', name: '王冠', msg: '主導権を戻すタイミングです。人任せでは形になりません。' },
      { icon: '🪞', name: '鏡', msg: '課題は能力不足ではなく、自己認識の甘さかもしれません。' },
      { icon: '🕯️', name: '灯', msg: '静かな時間に答えが出やすい日です。' },
      { icon: '💎', name: '宝石', msg: 'すでに持つ強みを軽く見積もらないこと。' },
      { icon: '🪽', name: '翼', msg: '場所を少し変えるだけで、運が切り替わる日です。' }
    ];

    const state = {
      step: 0,
      historyCount: 0,
      answers: [],
      done: false,
      locked: false,
      tarotChosen: false,
      tarot: null,
      currentScreen: 'chat'
    };

    function spawnParticles(target, count = 12) {
      const rect = target.getBoundingClientRect();
      const baseX = rect.left + rect.width / 2;
      const baseY = rect.top + rect.height / 2;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = `${baseX}px`;
        p.style.top = `${baseY}px`;
        p.style.setProperty('--dx', `${(Math.random() - 0.5) * 140}px`);
        p.style.setProperty('--dy', `${(Math.random() - 0.5) * 120 - 20}px`);
        particles.appendChild(p);
        setTimeout(() => p.remove(), 900);
      }
    }

    function scrollChatBottom() {
      requestAnimationFrame(() => { chatLog.scrollTop = chatLog.scrollHeight; });
    }

    function showScreen(name) {
      state.currentScreen = name;
      chatScreen.hidden = name !== 'chat';
      summaryScreen.hidden = name !== 'summary';
      finaleScreen.hidden = name !== 'finale';
      inputCard.hidden = true;
      hintText.textContent = name === 'chat'
        ? (state.done ? '最後に1枚、選んでね。' : 'こぶぶに話しかけてね。')
        : name === 'summary'
          ? '読み終わったら、また話せるよ。'
          : '最後に1枚だけ選んでね。';
    }

    function setLocked(flag) {
      state.locked = flag;
      typingBox.classList.toggle('show', flag);
      choiceGrid.hidden = flag;
      utilityRow.hidden = flag;
      inputCard.hidden = true;
      
    }

    function updateStepUI() {
      const pct = state.done ? 100 : (state.step / steps.length) * 100;
      progressFill.style.width = `${pct}%`;
      const currentName = state.done ? 'タロット' : steps[state.step].name;
      stepLabel.textContent = currentName;
      progressText.textContent = state.done ? '6 / 6' : `${state.step + 1} / 6`;
      modeText.textContent = state.done ? 'タロット' : steps[state.step].name;
      etaLabel.textContent = state.done ? '会話完了' : `残り約${Math.max(1, 5 - state.step)}分`;
      phasePill.textContent = state.done ? 'FINAL' : `${state.step + 1} / 6`;
      
    }

    function addMessage(role, text) {
      const row = document.createElement('div');
      row.className = `msg ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      chatLog.appendChild(row);
      scrollChatBottom();
      return bubble;
    }

    async function typeAiMessage(text) {
      setLocked(true);
      const bubble = addMessage('ai', '');
      return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
          bubble.textContent = text.slice(0, i + 1);
          i += 1;
          scrollChatBottom();
          if (i >= text.length) {
            clearInterval(interval);
            setLocked(false);
            renderActions();
            resolve();
          }
        }, 18);
      });
    }

    function pickInsight(kind = 'auto') {
      const turn = state.historyCount;
      if (kind === 'wisdom' || (kind === 'auto' && turn % 3 === 0)) return philosopherQuotes[turn % philosopherQuotes.length];
      if (kind === 'watch' || (kind === 'auto' && turn % 3 === 1)) return watchTrivia[turn % watchTrivia.length];
      return { who: 'やわらかい助言', line: softAdvice[turn % softAdvice.length], tip: '' };
    }

    function interimSummaryText() {
      const first = state.answers[0] || '今の気分';
      const second = state.answers[1] || '引っかかっていること';
      const third = state.answers[2] || '望む方向';
      const action = state.answers[4] || '次の一手';
      return `ここまでの総括です。\n\nいまのあなたは「${first}」という入口から会話を始めていて、「${second}」が負荷の中心として見えています。その一方で、本音としては「${third}」に近づきたい気持ちがあります。これは、ただつらさを減らしたいというより、進み方そのものを整えたい段階に入っているということです。\n\n現時点で大切なのは、気持ちの重さを全部解決することではなく、次の一手を軽くすることです。今の会話の流れなら「${action}」のような小さい行動が合っています。まだ途中ですが、方向はちゃんと見え始めています。`;
    }

    function finalSummaryText(card) {
      const first = state.answers[0] || '今の気分';
      const second = state.answers[1] || '引っかかっていること';
      const third = state.answers[2] || '望む方向';
      const action = state.answers[4] || '今日の一手';
      const ending = state.answers[5] || 'いまの終わり方';
      return `今回の総括です。\n\n今のあなたは「${first}」という入口から話し始め、「${second}」がいまの負荷として見えてきました。その一方で、本音としては「${third}」へ近づきたい気持ちがあります。これは、ただしんどさを減らしたいだけではなく、自分の進み方を整えたい段階に入っているということです。\n\n今日の現実的な一手としては「${action}」が合っています。大きく変わろうとするより、まず小さく整えるほうが今の流れには合っています。そして会話の終わり方として「${ending}」を選んだのは、いまの自分に必要な温度感をちゃんと分かっているからです。\n\n最後に引いた「${card.name}」は、「${card.msg.replace(/。$/, '')}」という流れを示していました。結論として、いまのテーマは『無理に勢いを出すこと』ではなく、『気持ちのノイズを減らして次の一手を軽くすること』です。今日は全部解決しなくて大丈夫です。ひとつ整えば、次のひとつが見えます。`;
    }

    function openSummary(isFinal) {
      summaryTitle.textContent = isFinal ? '最後の総括' : '途中の総括';
      summarySub.textContent = isFinal ? '会話全体とタロットをまとめます。' : 'ここまでの会話をやわらかく整理します。';
      summaryPill.textContent = isFinal ? 'FINAL SUMMARY' : '中間まとめ';
      summaryBody.textContent = isFinal && state.tarot ? finalSummaryText(state.tarot) : interimSummaryText();
      summaryActions.innerHTML = '';

      if (isFinal) {
        const restart = document.createElement('button');
        restart.className = 'primary';
        restart.textContent = '最初からやり直す';
        restart.addEventListener('click', resetSession);
        summaryActions.appendChild(restart);
      } else {
        const back = document.createElement('button');
        back.className = 'primary';
        back.textContent = '会話に戻る';
        back.addEventListener('click', () => showScreen('chat'));

        const wisdom = document.createElement('button');
        wisdom.className = 'soft-btn';
        wisdom.textContent = '偉人の言葉をもらう';
        wisdom.addEventListener('click', async () => {
          showScreen('chat');
          await injectWisdom();
        });

        summaryActions.appendChild(back);
        summaryActions.appendChild(wisdom);
      }

      showScreen('summary');
    }

    function showFinale() {
      showScreen('finale');
      finalBody.textContent = state.tarotChosen ? 'タロットはすでに選択済みです。総括画面へ進んでください。' : '1枚だけ選んでください。選ぶとそのまま総括画面へ切り替わります。';
    }

    function makeAiResponse(stepIndex, answer) {
      const a = answer || 'そのまま進めたい';
      if (stepIndex === 0) return `うん、${a}なんですね。まずはその感覚をそのまま受け取って大丈夫です。\n次は、今ひっかかっている場所を少しだけ見ていきましょう。`;
      if (stepIndex === 1) return `いま引っかかっている場所が ${a} なんですね。そこが見えると、対処の仕方がかなり変わります。\n次は「どうなりたいか」を見て、出口の向きをつくりましょう。`;
      if (stepIndex === 2) return `${a} に近づきたい、というのが今の本音なんですね。良いです。避けたいことではなく行きたい方向が見えると、会話の質が変わります。\nここで少しだけ寄り道を入れて、気分をほぐしながら続けます。`;
      if (stepIndex === 3) {
        if (a.includes('偉人')) return `では少しだけ偉人の言葉を挟みます。考え方の軸が入ると、悩みが少し薄まることがあります。\nそのあとで、今日の一手を決めましょう。`;
        if (a.includes('腕時計')) return `では少しだけ腕時計の蘊蓄を挟みます。機械の話は、意外と気持ちを落ち着かせることがあります。\nそのあとで、今日の一手を決めます。`;
        if (a.includes('助言')) return `では、やわらかい助言をひとつ挟みます。今は勢いより、呼吸が合う言葉のほうが役に立ちそうです。\nそのあとで、今日の一手へ進みます。`;
        return `そのまま続けましょう。寄り道しない選び方も、今のあなたには合っているのかもしれません。\n次は今日の一手を決めます。`;
      }
      if (stepIndex === 4) return `今日の一手として ${a} を選ぶのは良いです。抽象的な決意より、具体的な一つのほうが動きやすいです。\n最後に、どんな温度感で会話を閉じるかを選びましょう。`;
      if (stepIndex === 5) return `わかりました。${a} という終わり方で整えます。\nここまでの会話はここで区切って、最後にタロットを1枚だけ引きましょう。`;
      return 'ありがとう。';
    }

    async function handleChoice(answer) {
      if (state.locked || state.done) return;
      const stepIndex = state.step;
      state.answers[stepIndex] = answer;
      state.historyCount += 1;
      addMessage('user', answer);
      const response = makeAiResponse(stepIndex, answer);
      await typeAiMessage(response);

      if (stepIndex >= steps.length - 1) {
        state.done = true;
        updateStepUI();
        renderActions();
        await typeAiMessage('ここまでありがとう。最後のタロットだけが、いまの次の行動です。');
        showFinale();
        return;
      }

      state.step += 1;
      updateStepUI();
      renderActions();
    }

    async function injectWisdom() {
      if (state.locked || state.currentScreen !== 'chat') return;
      state.historyCount += 1;
      const item = pickInsight('wisdom');
      await typeAiMessage(`${item.who}\n${item.line}\n\n${item.tip}`);
    }

    async function injectWatch() {
      if (state.locked || state.currentScreen !== 'chat') return;
      state.historyCount += 1;
      const item = pickInsight('watch');
      await typeAiMessage(`${item.who}\n${item.line}\n\n${item.tip}`);
    }

    async function handleFreeInput(text) {
      if (state.locked || state.done) return;
      state.historyCount += 1;
      addMessage('user', text);
      let kind = 'soft';
      if (/時計|腕時計|機械式|クロノ|ダイバー|ベゼル/.test(text)) kind = 'watch';
      else if (/焦り|不安|意味|迷い|失敗|挑戦|優先|本音/.test(text)) kind = 'wisdom';
      const response = `${text.length > 28 ? 'その言い方には、ちゃんと今の温度が出ています。' : '短い言葉でも十分に伝わります。'}\n${kind === 'watch' ? 'ここでは腕時計の蘊蓄を少し挟みます。' : kind === 'wisdom' ? 'ここでは偉人の言葉を少し挟みます。' : 'この内容も踏まえて、会話を続けます。'}`;
      await typeAiMessage(response);
      if (!state.answers[state.step]) state.answers[state.step] = text;
      if (state.step >= steps.length - 1) {
        state.done = true;
        updateStepUI();
        renderActions();
        await typeAiMessage('ここまでの流れで十分です。最後のタロットだけが、いまの次の行動です。');
        showFinale();
      } else {
        state.step += 1;
        updateStepUI();
        renderActions();
      }
    }

    function renderActions() {
      if (state.currentScreen !== 'chat') return;
      if (state.done) {
        questionBox.textContent = '最後に1枚、タロットを選んでね。';
        choiceGrid.innerHTML = '';
        utilityRow.innerHTML = '';
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = '最後のタロットへ進む';
        btn.addEventListener('click', showFinale);
        choiceGrid.appendChild(btn);
        inputCard.hidden = true;
        return;
      }

      questionBox.textContent = steps[state.step].question;
      choiceGrid.innerHTML = '';
      steps[state.step].replies.forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = label;
        btn.addEventListener('click', (e) => {
          if (state.locked) return;
          spawnParticles(e.currentTarget, 10);
          handleChoice(label);
        });
        choiceGrid.appendChild(btn);
      });

      utilityRow.innerHTML = '';
      utilityRow.hidden = true;
      inputCard.hidden = true;
    }

    function resetSession() {
      state.step = 0;
      state.historyCount = 0;
      state.answers = [];
      state.done = false;
      state.locked = false;
      state.tarotChosen = false;
      state.tarot = null;
      chatLog.innerHTML = '';
      document.querySelectorAll('.card-btn').forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('active');
      });
      finalBody.textContent = '1枚選ぶと、そのまま総括画面へ進みます。';
      updateStepUI();
      showScreen('chat');
      renderActions();
      addMessage('ai', 'こんにちは。今日はどんな気分？');
      questionBox.textContent = '今の気分にいちばん近いものを選んでください。';
      scrollChatBottom();
    }

    

    tarotDeck.forEach(card => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'card-btn';
      btn.innerHTML = `<span aria-hidden="true">${card.icon}</span>`;
      btn.title = card.name;
      const choose = () => {
        if (!state.done || state.tarotChosen) return;
        state.tarotChosen = true;
        state.tarot = card;
        document.querySelectorAll('.card-btn').forEach(el => {
          el.disabled = true;
          el.classList.remove('active');
        });
        btn.classList.add('active');
        btn.disabled = false;
        finalBody.textContent = `【${card.name}】\n${card.msg}\n\nこのカードで確定しました。総括画面へ切り替えます。`;
        spawnParticles(btn, 16);
        setTimeout(() => openSummary(true), 700);
      };
      btn.addEventListener('click', choose);
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        choose();
      }, { passive: false });
      cardGrid.appendChild(btn);
    });

    let audioCtx;
    let bgmOn = false;
    let bgmTimer;
    let liveNodes = [];

    function bellTone(freq, start, amp = 0.024, duration = 1.8, gong = false) {
      const ratios = gong ? [1, 1.48, 2.92, 4.11] : [1, 1.52, 2.17, 3.86];
      const decays = gong ? [1.6, 1.3, 1.0, 0.8] : [1.2, 0.85, 0.55, 0.42];
      ratios.forEach((r, i) => {
        const oscA = audioCtx.createOscillator();
        const oscB = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscA.type = 'sine';
        oscB.type = 'triangle';
        oscA.frequency.value = freq * r;
        oscB.frequency.value = freq * r * 1.006;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(amp / (i + 1), start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + Math.max(0.18, duration * decays[i]));
        oscA.connect(gain);
        oscB.connect(gain);
        gain.connect(audioCtx.destination);
        oscA.start(start);
        oscB.start(start);
        oscA.stop(start + duration * decays[i] + 0.08);
        oscB.stop(start + duration * decays[i] + 0.08);
        liveNodes.push(oscA, oscB, gain);
      });
    }

    function scheduleGamelan() {
      if (!audioCtx || !bgmOn) return;
      const now = audioCtx.currentTime + 0.08;
      const pelogish = [220, 247, 277, 330, 370];
      const left = [0, 2, 1, 3, 2, 4, 1, 3];
      const right = [2, 3, 2, 4, 0, 2, 1, 4];
      const spacing = 0.22;
      bellTone(110, now, 0.032, 2.6, true);
      for (let i = 0; i < left.length; i++) {
        const t1 = now + i * spacing;
        const t2 = now + i * spacing + spacing / 2;
        bellTone(pelogish[left[i]], t1, 0.018, 1.1, false);
        bellTone(pelogish[right[i]], t2, 0.016, 0.95, false);
      }
      bellTone(147, now + left.length * spacing - 0.08, 0.024, 1.8, true);
      bgmTimer = setTimeout(scheduleGamelan, left.length * spacing * 1000 + 120);
    }

    async function toggleBgm() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      bgmOn = !bgmOn;
      bgmBtn.textContent = bgmOn ? '♪ BGM OFF' : '♪ BGM ON';
      if (bgmOn) {
        scheduleGamelan();
      } else {
        clearTimeout(bgmTimer);
        liveNodes.forEach(node => { try { node.disconnect?.(); } catch (_) {} });
        liveNodes = [];
      }
    }

    bgmBtn.addEventListener('click', toggleBgm);

    sendBtn.textContent = 'こぶぶに話す';

    resetSession();
  </script>
</body>
